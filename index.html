<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ONE LIFE">
<meta name="theme-color" content="#080808">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>ONE LIFE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Manrope:wght@600;700;800&display=swap');

:root {
  --bg:       #080808;
  --bg2:      #111111;
  --bg3:      #191919;
  --bg4:      #222222;
  --bg5:      #2a2a2a;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.12);
  --border3:  rgba(255,255,255,0.20);
  --text:     #EFEFEF;
  --text2:    #888;
  --text3:    #444;
  --accent:   #6C8EFF;
  --accent2:  #4F6EE8;
  --green:    #34D399;
  --green2:   rgba(52,211,153,0.12);
  --amber:    #FBBF24;
  --amber2:   rgba(251,191,36,0.12);
  --red:      #F87171;
  --red2:     rgba(248,113,113,0.10);
  --purple:   #A78BFA;
  --purple2:  rgba(167,139,250,0.12);
  --r:        14px;
  --r-lg:     20px;
  --r-xl:     24px;
  --tab-h:    84px;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:15px;overflow:hidden;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;height:calc(60px + var(--safe-top));padding-top:var(--safe-top);background:rgba(8,8,8,0.90);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:0.5px solid var(--border);display:flex;align-items:flex-end;padding-bottom:12px;padding-left:20px;padding-right:20px;z-index:10}
.topbar-logo{font-family:'Manrope',sans-serif;font-size:17px;font-weight:800;letter-spacing:3px;color:var(--text);flex:1}
.topbar-logo span{color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:10px}
.week-nav{display:flex;align-items:center;gap:6px}
.week-nav button{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);font-size:16px;width:30px;height:30px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.week-nav .wlbl{font-size:11px;color:var(--text2);min-width:88px;text-align:center;font-weight:500}
.xp-pill{display:flex;align-items:center;gap:6px;background:var(--amber2);border:0.5px solid rgba(251,191,36,0.2);border-radius:20px;padding:4px 10px}
.xp-pill-lv{font-size:12px;font-weight:700;color:var(--amber);font-family:'Manrope',sans-serif}
.xp-pill-bar{width:40px;height:3px;background:rgba(251,191,36,0.2);border-radius:2px;overflow:hidden}
.xp-pill-fill{height:100%;background:var(--amber);border-radius:2px;transition:width 0.5s}
.edit-btn{background:var(--bg3);border:0.5px solid var(--border2);border-radius:10px;padding:5px 12px;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif}
.edit-btn.active{color:var(--red);border-color:rgba(248,113,113,0.3);background:var(--red2)}

/* ── SCROLL ── */
.page-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:20px 16px calc(var(--tab-h) + var(--safe-bot) + 12px)}

/* ── TABBAR ── */
.tabbar{flex-shrink:0;height:calc(var(--tab-h) + var(--safe-bot));padding-bottom:var(--safe-bot);background:rgba(8,8,8,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:0.5px solid var(--border);display:flex;align-items:flex-start;padding-top:10px;z-index:10}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:2px 0}
.tab-btn .ti{font-size:22px;line-height:1;transition:transform 0.2s}
.tab-btn .tl{font-size:9px;font-weight:500;color:var(--text3);letter-spacing:0.3px;transition:color 0.15s}
.tab-btn.active .tl{color:var(--accent)}
.tab-btn:not(.active) .ti{opacity:0.35}
.tab-btn.active .ti{transform:scale(1.1)}

/* ── SECTION LABEL ── */
.sec-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-left:2px}

/* ── HERO STATS ── */
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.hero-stat{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:16px}
.hero-stat-lbl{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:8px;letter-spacing:0.3px}
.hero-stat-val{font-family:'Manrope',sans-serif;font-size:32px;font-weight:800;line-height:1}
.hero-stat-val.blue{color:var(--accent)}
.hero-stat-val.green{color:var(--green)}
.hero-stat-val.amber{color:var(--amber)}
.hero-stat-val.purple{color:var(--purple)}
.hero-stat-sub{font-size:11px;color:var(--text3);margin-top:6px}
.mini-bar{height:3px;background:var(--bg4);border-radius:2px;margin-top:10px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px;transition:width 0.4s}

/* ── CARD ── */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px}
.card-top{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px}
.card-badge{font-size:11px;font-weight:600;color:var(--accent);background:rgba(108,142,255,0.1);border-radius:8px;padding:3px 8px}

/* ── GOAL ROWS ── */
.goal-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border)}
.goal-row:last-child{border-bottom:none}
.gcheck{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:all 0.2s}
.gcheck.done{background:var(--green);border-color:var(--green);color:#000}
.ginput{flex:1;background:none;border:none;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;outline:none;font-weight:400}
.ginput::placeholder{color:var(--text3)}
.ginput.done{text-decoration:line-through;color:var(--text3)}
.del-btn{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;opacity:0;transition:opacity 0.15s;flex-shrink:0;line-height:1}
.edit-mode .del-btn{opacity:1;color:var(--red)}

/* ── DAY SELECTOR ── */
.day-strip{display:flex;gap:8px;overflow-x:auto;padding:0 0 2px;scrollbar-width:none;margin-bottom:14px}
.day-strip::-webkit-scrollbar{display:none}
.day-chip{flex-shrink:0;background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:9px 14px;cursor:pointer;text-align:center;min-width:52px;transition:all 0.18s}
.day-chip.active{background:var(--accent);border-color:var(--accent)}
.day-chip .dn{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.3px}
.day-chip .dd{font-size:10px;color:var(--text3);margin-top:2px}
.day-chip.active .dn{color:#fff}
.day-chip.active .dd{color:rgba(255,255,255,0.65)}
.day-chip.today:not(.active) .dn{color:var(--accent)}
.day-chip.today:not(.active){border-color:rgba(108,142,255,0.3)}

/* ── TASK ROWS ── */
.task-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border)}
.task-row:last-child{border-bottom:none}
.tcheck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all 0.2s;cursor:pointer}
.tcheck.done{background:var(--green);border-color:var(--green);color:#000}
.task-text{flex:1;font-size:15px;color:var(--text);font-weight:400}
.task-text.done{text-decoration:line-through;color:var(--text3)}
.add-row{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;opacity:0.7;transition:opacity 0.15s}
.add-row:active{opacity:1}
.add-circle{width:22px;height:22px;border-radius:50%;background:none;border:1.5px dashed var(--border3);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);flex-shrink:0}
.add-row span{font-size:14px;color:var(--text3)}

/* ── PROGRESS BAR CHART ── */
.bar-section{padding:16px}
.bar-chart{display:flex;gap:6px;align-items:flex-end;height:80px;margin-bottom:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.bar-track{width:100%;flex:1;background:var(--bg4);border-radius:6px 6px 0 0;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;position:relative}
.bar-fill{width:100%;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:6px 6px 0 0;transition:height 0.5s cubic-bezier(.4,0,.2,1);min-height:0}
.bar-lbl{font-size:9px;color:var(--text3);font-weight:500}

/* ── HABIT CARD ── */
.habit-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px}
.habit-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.habit-name{font-size:15px;font-weight:500;flex:1}
.habit-streak{font-size:12px;font-weight:700;color:var(--amber);background:var(--amber2);border-radius:8px;padding:3px 8px}
.habit-days{display:flex;gap:5px}
.hday{flex:1;aspect-ratio:1;border-radius:10px;background:var(--bg4);border:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;transition:all 0.15s}
.hday.done{background:var(--green2);border-color:rgba(52,211,153,0.3)}
.hday .hd-lbl{font-size:8px;font-weight:600;color:var(--text3);letter-spacing:0.3px}
.hday .hd-dot{width:5px;height:5px;border-radius:50%;background:var(--border2)}
.hday.done .hd-dot{background:var(--green)}

/* ── MOOD ── */
.mood-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.mood-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:14px 10px;text-align:center}
.mood-icon{font-size:22px;margin-bottom:6px}
.mood-lbl{font-size:10px;color:var(--text3);font-weight:500;margin-bottom:8px;letter-spacing:0.3px}
.mood-val{font-family:'Manrope',sans-serif;font-size:28px;font-weight:800;line-height:1;margin-bottom:10px}
.mood-btns{display:flex;gap:6px;justify-content:center}
.mood-btns button{width:30px;height:30px;border-radius:10px;background:var(--bg4);border:0.5px solid var(--border2);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif}

/* ── ENERGY CHART ── */
.energy-wrap{padding:16px}
.energy-legend{display:flex;gap:14px;margin-bottom:14px}
.e-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-weight:500}
.e-dot{width:8px;height:8px;border-radius:50%}
.chart-area{height:100px;position:relative;margin-bottom:8px}
.chart-area svg{width:100%;height:100%}
.chart-days{display:flex;justify-content:space-between}
.chart-day{font-size:9px;color:var(--text3);font-weight:500}
.energy-insight{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-top:12px;font-size:13px;color:var(--text2);line-height:1.6;border-left:2px solid var(--accent)}

/* ── DIARY ── */
.diary-ta{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;resize:none;outline:none;margin-bottom:10px;-webkit-appearance:none;line-height:1.6;transition:border-color 0.15s}
.diary-ta:focus{border-color:var(--border2)}
.diary-ta::placeholder{color:var(--text3)}
.diary-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;padding-left:2px}

/* ── MONTH ── */
.month-cat{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px}
.month-cat-head{padding:14px 16px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.month-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.month-cat-name{font-size:13px;font-weight:600;flex:1}
.month-cat-count{font-size:11px;color:var(--text3)}
.month-task-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid var(--border)}
.month-task-row:last-child{border-bottom:none}
.m-dot{width:8px;height:8px;border-radius:50%;background:var(--border3);flex-shrink:0;cursor:pointer;transition:all 0.15s}
.m-dot.done{background:var(--green)}
.m-inp{flex:1;background:none;border:none;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none}
.m-inp::placeholder{color:var(--text3)}
.m-inp.done{text-decoration:line-through;color:var(--text3)}

/* ── STORAGE ── */
.storage-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border)}
.storage-item:last-child{border-bottom:none}
.s-check{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all 0.2s}
.s-check.done{background:var(--green2);border-color:var(--green);color:var(--green)}
.s-inp{flex:1;background:none;border:none;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none}
.s-inp.done{text-decoration:line-through;color:var(--text3)}

/* ── XP PAGE ── */
.xp-hero{background:linear-gradient(135deg,rgba(108,142,255,0.08) 0%,rgba(167,139,250,0.08) 100%);border:0.5px solid rgba(108,142,255,0.15);border-radius:var(--r-xl);padding:24px 20px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.xp-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(108,142,255,0.15),transparent 70%);border-radius:50%}
.xp-hero-num{font-family:'Manrope',sans-serif;font-size:72px;font-weight:800;color:var(--amber);line-height:1;margin-bottom:4px}
.xp-hero-title{font-size:18px;font-weight:700;margin-bottom:4px}
.xp-hero-sub{font-size:13px;color:var(--text3);margin-bottom:18px}
.xp-hero-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:0 10px}
.xp-hero-prog{height:100%;background:linear-gradient(90deg,var(--amber),var(--accent));border-radius:3px;transition:width 0.6s}
.xp-hero-pts{font-size:11px;color:var(--text3);margin-top:6px}
.achiev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.achiev{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center}
.achiev.done{border-color:rgba(251,191,36,0.25);background:rgba(251,191,36,0.05)}
.achiev-ic{font-size:26px;margin-bottom:6px;filter:grayscale(1);opacity:0.3}
.achiev.done .achiev-ic{filter:none;opacity:1}
.achiev-nm{font-size:10px;color:var(--text3);line-height:1.3;font-weight:500}
.achiev.done .achiev-nm{color:var(--text2)}
.xp-log{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.xp-log-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--border)}
.xp-log-item:last-child{border-bottom:none}
.xp-log-text{font-size:13px;color:var(--text2)}
.xp-log-date{font-size:10px;color:var(--text3);margin-top:2px}
.xp-log-pts{font-size:14px;font-weight:700;color:var(--amber)}

/* ── COACH ── */
.coach-hero{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-xl);padding:20px;margin-bottom:12px}
.coach-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.coach-ava{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.coach-info-name{font-size:16px;font-weight:700;margin-bottom:2px}
.coach-info-sub{font-size:12px;color:var(--text3)}
.coach-text{font-size:15px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
.coach-text.loading{color:var(--text3);font-style:italic;font-size:14px}
.coach-action{width:100%;padding:14px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;margin-top:10px;transition:all 0.15s}
.coach-action:active{background:var(--bg4)}
.energy-rating{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-xl);padding:20px;margin-bottom:12px}
.er-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.er-label{font-size:13px;color:var(--text2);font-weight:500}
.er-val{font-size:14px;font-weight:700;color:var(--accent)}
.er-track{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:14px}
.er-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--accent));border-radius:3px;transition:width 0.5s}
.backup-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.backup-btn{padding:14px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;text-align:center;transition:all 0.15s}
.backup-btn.green{background:var(--green2);border-color:rgba(52,211,153,0.2);color:var(--green)}
.backup-btn:active{opacity:0.7}

/* ── FAB ── */
.fab{position:fixed;right:20px;bottom:calc(var(--tab-h) + var(--safe-bot) + 20px);width:56px;height:56px;background:var(--accent);border-radius:18px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:0 8px 24px rgba(108,142,255,0.35);z-index:20;transition:transform 0.15s,box-shadow 0.15s}
.fab:active{transform:scale(0.93);box-shadow:0 4px 12px rgba(108,142,255,0.2)}

/* ── SHEETS ── */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;backdrop-filter:blur(8px)}
.sheet{width:100%;background:var(--bg2);border-radius:24px 24px 0 0;padding:24px 20px;padding-bottom:calc(20px + var(--safe-bot));border-top:0.5px solid var(--border2)}
.sheet-handle{width:36px;height:4px;background:var(--bg5);border-radius:2px;margin:0 auto 20px}
.sheet h3{font-size:18px;font-weight:700;margin-bottom:16px}
.sheet input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);padding:14px 16px;color:var(--text);font-size:16px;font-family:'Inter',sans-serif;outline:none;margin-bottom:12px;-webkit-appearance:none;transition:border-color 0.15s}
.sheet input:focus{border-color:var(--accent)}
.btn-row{display:flex;gap:10px}
.btn-cancel{flex:1;padding:14px;border-radius:var(--r);background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);font-size:15px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif}
.btn-ok{flex:2;padding:14px;border-radius:var(--r);background:var(--accent);border:none;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.ctx-sheet{width:100%;background:var(--bg2);border-radius:24px 24px 0 0;padding:20px;padding-bottom:calc(16px + var(--safe-bot));border-top:0.5px solid var(--border2)}
.ctx-handle{width:36px;height:4px;background:var(--bg5);border-radius:2px;margin:0 auto 16px}
.ctx-preview{font-size:13px;color:var(--text3);text-align:center;margin-bottom:16px;padding-bottom:14px;border-bottom:0.5px solid var(--border)}
.ctx-opt{width:100%;padding:15px;border:none;border-radius:var(--r);font-size:15px;font-weight:500;cursor:pointer;margin-bottom:8px;font-family:'Inter',sans-serif;text-align:left;display:flex;align-items:center;gap:10px}
.ctx-opt.edit{background:var(--bg3);color:var(--text)}
.ctx-opt.del{background:var(--red2);color:var(--red)}
.ctx-opt.cancel{background:var(--bg3);color:var(--text2)}

/* ── XP TOAST ── */
.xp-toast{position:fixed;top:calc(68px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-8px);background:var(--bg2);border:0.5px solid rgba(251,191,36,0.25);border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--amber);z-index:200;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
.xp-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LEVEL UP ── */
.lu-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;backdrop-filter:blur(16px)}
.lu-glow{width:120px;height:120px;background:radial-gradient(circle,rgba(251,191,36,0.3),transparent 70%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:64px}
.lu-num{font-family:'Manrope',sans-serif;font-size:56px;font-weight:800;color:var(--amber)}
.lu-title{font-size:22px;font-weight:700}
.lu-sub{font-size:15px;color:var(--text3)}
.lu-btn{margin-top:8px;padding:16px 40px;background:var(--amber);border:none;border-radius:16px;font-size:16px;font-weight:700;color:#000;cursor:pointer;font-family:'Manrope',sans-serif}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:opacity 0.6s}
.splash-logo{font-family:'Manrope',sans-serif;font-size:28px;font-weight:800;letter-spacing:5px}
.splash-logo span{color:var(--accent)}
.splash-sub{font-size:12px;color:var(--text3);letter-spacing:3px;font-weight:500}
.hidden{display:none!important}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<script>
const DAYS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const HDEF=['Зарядка','Дефицит ккал','Соц сети <1ч','Дневник','Сон 7ч+'];
const MCATS=[{n:'Работа',c:'#6C8EFF'},{n:'Деньги',c:'#34D399'},{n:'Спорт',c:'#FBBF24'},{n:'Здоровье',c:'#F87171'},{n:'Для себя',c:'#A78BFA'},{n:'Быт',c:'#888'}];
const LVL_NAMES=['Новичок','Стартер','Практик','Деятель','Боец','Мастер','Чемпион','Легенда','Герой','Бог'];
const ACHIEV=[{id:'t1',ic:'✅',n:'Первая задача'},{id:'h7',ic:'🔥',n:'7 дней привычки'},{id:'g1',ic:'🎯',n:'Цель выполнена'},{id:'lv5',ic:'⚡',n:'Уровень 5'},{id:'lv10',ic:'💎',n:'Уровень 10'},{id:'t50',ic:'💪',n:'50 задач'},{id:'d7',ic:'📓',n:'Дневник 7 дней'},{id:'s10',ic:'💡',n:'10 идей'},{id:'hab5',ic:'🏆',n:'5 привычек'}];

let page='week',wOff=0,selDay=0,em=false,ctx={},ecb=null,addMode='task';

const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const wDates=(off)=>{const n=new Date(),d=n.getDay(),m=new Date(n);m.setDate(n.getDate()-(d===0?6:d-1)+off*7);return DAYS.map((_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x;});};
const fmt=(d)=>d.getDate()+'.'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1);
const isToday=(d)=>{const n=new Date();return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth();};
const wk=(o)=>ld('wk_'+o,{goals:[],goalsD:[],tasks:DAYS.map(()=>[]),tasksD:DAYS.map(()=>[]),mood:DAYS.map(()=>({sleep:7,energy:7,mood:7,lesson:'',gratitude:''}))});
const swk=(o,d)=>sv('wk_'+o,d);
const hb=()=>ld('hb2',{list:[...HDEF],days:{}});
const shb=(d)=>sv('hb2',d);
const mn=()=>ld('mn',MCATS.map(c=>({...c,tasks:['','','',''],done:[false,false,false,false]})));
const smn=(d)=>sv('mn',d);
const st=()=>ld('st',[]);
const sst=(d)=>sv('st',d);

// XP
const xpd=()=>ld('xp',{total:0,level:1,hist:[]});
const sxp=(d)=>sv('xp',d);
const xpNeeded=(lv)=>lv*100;

function addXP(amt,why){
  const x=xpd(),prev=x.level;
  x.total+=amt;
  x.hist.unshift({p:amt,r:why,d:fmt(new Date())});
  if(x.hist.length>30)x.hist=x.hist.slice(0,30);
  let need=xpNeeded(x.level);
  while(x.total>=need){x.total-=need;x.level++;need=xpNeeded(x.level);}
  sxp(x);
  showToast('+'+amt+' XP');
  if(x.level>prev)showLU(x.level);
  updXP();
}

function updXP(){
  const x=xpd(),need=xpNeeded(x.level),pct=Math.round(x.total/need*100);
  document.getElementById('xpLv').textContent='Ур.'+x.level;
  document.getElementById('xpFill').style.width=pct+'%';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function showLU(lv){
  const name=LVL_NAMES[Math.min(lv-1,LVL_NAMES.length-1)];
  document.getElementById('luNum').textContent=lv;
  document.getElementById('luTitle').textContent='Уровень '+lv+'!';
  document.getElementById('luSub').textContent='Ты — '+name+'!';
  document.getElementById('luOv').classList.remove('hidden');
}

function calcStats(o){
  const w=wk(o);let tot=0,don=0;
  w.tasks.forEach((ts,di)=>ts.forEach((t,ti)=>{if(t){tot++;if(w.tasksD[di][ti])don++;}}));
  w.goals.forEach((g,i)=>{if(g){tot++;if(w.goalsD[i])don++;}});
  const pct=tot>0?Math.round(don/tot*100):0;
  const gd=w.goals.filter((g,i)=>g&&w.goalsD[i]).length;
  return{tot,don,pct,gd,gt:w.goals.filter(g=>g).length};
}

function getEI(){
  const w=wk(wOff),m=w.mood.map(x=>x||{sleep:7,energy:7,mood:7});
  const avg=(k)=>+(m.reduce((s,x)=>s+x[k],0)/7).toFixed(1);
  const sl=avg('sleep'),en=avg('energy'),mo=avg('mood');
  const s=calcStats(wOff);
  let ins='';
  if(sl<=5)ins='😴 Недосып снижает продуктивность. Ляг на час раньше.';
  else if(en<=4)ins='⚡ Низкая энергия. Обрати внимание на питание и отдых.';
  else if(mo>=8&&s.pct>=70)ins='🚀 Отличная неделя! Настроение и продуктивность на высоте.';
  else if(mo<=4)ins='💙 Настроение ниже нормы. Добавь что-то приятное в каждый день.';
  else ins='📊 Неплохая неделя. Работай над стабильностью привычек.';
  return{sl,en,mo,ins};
}

// Edit mode
function toggleEdit(){
  em=!em;
  const b=document.getElementById('editBtn');
  b.textContent=em?'Готово':'Изменить';
  b.classList.toggle('active',em);
  render();
}

// Ctx menu
function showCtx(type,opts){
  ctx={type,...opts};
  document.getElementById('ctxPrev').textContent=opts.text||'';
  document.getElementById('ctxOv').classList.remove('hidden');
}
function doCtxDel(){
  hide('ctxOv');
  if(ctx.type==='task'){const w=wk(wOff);w.tasks[ctx.di].splice(ctx.ti,1);w.tasksD[ctx.di].splice(ctx.ti,1);swk(wOff,w);}
  else if(ctx.type==='goal'){const w=wk(wOff);w.goals.splice(ctx.ci,1);w.goalsD.splice(ctx.ci,1);swk(wOff,w);}
  else if(ctx.type==='habit'){const h=hb();h.list.splice(ctx.hi,1);Object.keys(h.days).forEach(k=>{if(h.days[k])h.days[k].splice(ctx.hi,1)});shb(h);}
  else if(ctx.type==='mtask'){const m=mn();m[ctx.ci].tasks.splice(ctx.ti,1);m[ctx.ci].done.splice(ctx.ti,1);smn(m);}
  else if(ctx.type==='stor'){const s=st();s.splice(ctx.si,1);sst(s);}
  render();
}
function doCtxEdit(){
  hide('ctxOv');
  document.getElementById('editInp').value=ctx.text||'';
  document.getElementById('editOv').classList.remove('hidden');
  setTimeout(()=>document.getElementById('editInp').focus(),80);
  ecb=(val)=>{
    if(ctx.type==='task'){const w=wk(wOff);w.tasks[ctx.di][ctx.ti]=val;swk(wOff,w);}
    else if(ctx.type==='goal'){const w=wk(wOff);w.goals[ctx.ci]=val;swk(wOff,w);}
    else if(ctx.type==='habit'){const h=hb();h.list[ctx.hi]=val;shb(h);}
    else if(ctx.type==='mtask'){const m=mn();m[ctx.ci].tasks[ctx.ti]=val;smn(m);}
    else if(ctx.type==='stor'){const s=st();s[ctx.si].text=val;sst(s);}
    render();
  };
}
function doEditSave(){const v=document.getElementById('editInp').value.trim();if(v&&ecb)ecb(v);hide('editOv');}

function ovClick(e,id){if(e.target.id===id)hide(id);}
function hide(id){document.getElementById(id).classList.add('hidden');}

function openAdd(){
  addMode=page==='storage'?'stor':page==='habits'?'hab':'task';
  document.getElementById('addTitle').textContent=addMode==='stor'?'Новая идея':addMode==='hab'?'Новая привычка':'Новая задача';
  document.getElementById('addInp').value='';
  document.getElementById('addOv').classList.remove('hidden');
  setTimeout(()=>document.getElementById('addInp').focus(),80);
}
function doAdd(){
  const v=document.getElementById('addInp').value.trim();if(!v)return;
  if(addMode==='stor'){const s=st();s.unshift({text:v,done:false});sst(s);addXP(5,'Новая идея');}
  else if(addMode==='hab'){const h=hb();h.list.push(v);Object.keys(h.days).forEach(k=>h.days[k].push(false));shb(h);addXP(10,'Новая привычка');}
  else{const w=wk(wOff);w.tasks[selDay].push(v);w.tasksD[selDay].push(false);swk(wOff,w);addXP(5,'Новая задача');}
  hide('addOv');render();
}

document.getElementById('addInp').addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});
document.getElementById('editInp').addEventListener('keydown',e=>{if(e.key==='Enter')doEditSave();});

function weekChange(d){wOff+=d;render();}
function selD(i){selDay=i;render();}

function toggleGoal(i){const w=wk(wOff);if(!w.goals[i])return;w.goalsD[i]=!w.goalsD[i];if(w.goalsD[i])addXP(20,'Цель выполнена');swk(wOff,w);render();}
function setGoal(i,v){const w=wk(wOff);w.goals[i]=v;swk(wOff,w);}
function addGoal(){const w=wk(wOff);w.goals.push('');w.goalsD.push(false);swk(wOff,w);render();}
function toggleTask(di,ti){const w=wk(wOff);if(!w.tasks[di][ti])return;w.tasksD[di][ti]=!w.tasksD[di][ti];if(w.tasksD[di][ti])addXP(10,'Задача выполнена');swk(wOff,w);render();}
function toggleHabit(hi,di){const h=hb(),dates=wDates(wOff),dk=fmt(dates[di]);if(!h.days[dk])h.days[dk]=h.list.map(()=>false);h.days[dk][hi]=!h.days[dk][hi];if(h.days[dk][hi])addXP(15,'Привычка выполнена');shb(h);render();}
function adjMood(di,k,d){const w=wk(wOff);if(!w.mood[di])w.mood[di]={sleep:7,energy:7,mood:7,lesson:'',gratitude:''};w.mood[di][k]=Math.max(1,Math.min(10,(w.mood[di][k]||7)+d));swk(wOff,w);render();}
function setDiary(di,k,v){const w=wk(wOff);if(!w.mood[di])w.mood[di]={sleep:7,energy:7,mood:7,lesson:'',gratitude:''};w.mood[di][k]=v;swk(wOff,w);}
function toggleMon(ci,ti){const m=mn();m[ci].done[ti]=!m[ci].done[ti];if(m[ci].done[ti])addXP(10,'Задача месяца');smn(m);render();}
function setMon(ci,ti,v){const m=mn();m[ci].tasks[ti]=v;smn(m);}
function addMonTask(ci){const m=mn();m[ci].tasks.push('');m[ci].done.push(false);smn(m);render();}
function toggleSt(i){const s=st();s[i].done=!s[i].done;sst(s);render();}
function editSt(i,v){const s=st();s[i].text=v;sst(s);}

// Backup
function exportData(){
  const keys=['hb2','mn','st','xp','achievements'];
  const data={v:2,date:new Date().toISOString(),weeks:{}};
  for(let i=-52;i<=52;i++){const k='wk_'+i,v=localStorage.getItem(k);if(v)data.weeks[k]=JSON.parse(v);}
  keys.forEach(k=>{const v=localStorage.getItem(k);if(v)data[k]=JSON.parse(v);});
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='onelife_'+fmt(new Date())+'.json';a.click();
  URL.revokeObjectURL(url);showToast('✅ Сохранено');
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.weeks)Object.entries(d.weeks).forEach(([k,v])=>sv(k,v));
        ['hb2','mn','st','xp','achievements'].forEach(k=>{if(d[k])sv(k,d[k]);});
        showToast('✅ Восстановлено');setTimeout(()=>render(),400);
      }catch{alert('Ошибка файла');}
    };r.readAsText(f);
  };inp.click();
}

// RENDER
function renderWeek(){

function renderHabits(){
  const h=hb(),dates=wDates(wOff);
  document.getElementById('ps').innerHTML=h.list.map((name,hi)=>{
    const days=dates.map(d=>(h.days[fmt(d)]||[])[hi]||false);
    const pct=Math.round(days.filter(Boolean).length/7*100);
    const streak=days.reduceRight((s,v)=>v?s+1:0,0);
    return `<div class="habit-card ${em?'edit-mode':''}">
      <div class="habit-card-top">
        <div class="habit-name">${name}</div>
        ${streak>0?`<div class="habit-streak">🔥 ${streak}</div>`:`<div style="font-size:12px;color:var(--text3)">${pct}%</div>`}
        <button class="del-btn" style="opacity:${em?1:0};margin-left:6px" onclick="showCtx('habit',{hi:${hi},text:'${name.replace(/'/g,"\\'")}'})" >⋯</button>
      </div>
      <div class="habit-days">${dates.map((d,di)=>`<div class="hday ${days[di]?'done':''}" onclick="toggleHabit(${hi},${di})"><div class="hd-lbl">${DAYS[di]}</div><div class="hd-dot"></div></div>`).join('')}</div>
    </div>`;
  }).join('')+`<div class="card"><div class="add-row" onclick="openAdd()"><div class="add-circle">+</div><span>Новая привычка</span></div></div>`;
}

function renderDiary(){
  const w=wk(wOff),dates=wDates(wOff),ei=getEI();
  const m=w.mood.map(x=>x||{sleep:7,energy:7,mood:7});
  const W=320,H=90;
  const line=(arr,color)=>{
    const pts=arr.map((v,i)=>[(i/(arr.length-1))*W,(1-v/10)*H]);
    return`<polyline points="${pts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    ${pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="${color}"/>`).join('')}`;
  };

  document.getElementById('ps').innerHTML=`
  <div class="day-strip">${dates.map((d,di)=>`<div class="day-chip ${di===selDay?'active':''} ${isToday(d)?'today':''}" onclick="selD(${di})"><div class="dn">${DAYS[di]}</div><div class="dd">${fmt(d)}</div></div>`).join('')}</div>

  <div class="mood-grid">
    <div class="mood-card"><div class="mood-icon">🌙</div><div class="mood-lbl">СОН</div><div class="mood-val" style="color:var(--accent)">${(w.mood[selDay]||{}).sleep||7}</div><div class="mood-btns"><button onclick="adjMood(${selDay},'sleep',-1)">−</button><button onclick="adjMood(${selDay},'sleep',1)">+</button></div></div>
    <div class="mood-card"><div class="mood-icon">⚡</div><div class="mood-lbl">ЭНЕРГИЯ</div><div class="mood-val" style="color:var(--amber)">${(w.mood[selDay]||{}).energy||7}</div><div class="mood-btns"><button onclick="adjMood(${selDay},'energy',-1)">−</button><button onclick="adjMood(${selDay},'energy',1)">+</button></div></div>
    <div class="mood-card"><div class="mood-icon">☀️</div><div class="mood-lbl">НАСТРОЕНИЕ</div><div class="mood-val" style="color:var(--green)">${(w.mood[selDay]||{}).mood||7}</div><div class="mood-btns"><button onclick="adjMood(${selDay},'mood',-1)">−</button><button onclick="adjMood(${selDay},'mood',1)">+</button></div></div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="card-top"><div class="card-title">График недели</div></div>
    <div class="energy-wrap">
      <div class="energy-legend">
        <div class="e-leg"><div class="e-dot" style="background:var(--accent)"></div>Сон</div>
        <div class="e-leg"><div class="e-dot" style="background:var(--amber)"></div>Энергия</div>
        <div class="e-leg"><div class="e-dot" style="background:var(--green)"></div>Настроение</div>
      </div>
      <div class="chart-area"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${line(m.map(x=>x.sleep),'#6C8EFF')}${line(m.map(x=>x.energy),'#FBBF24')}${line(m.map(x=>x.mood),'#34D399')}</svg></div>
      <div class="chart-days">${DAYS.map(d=>`<span class="chart-day">${d}</span>`).join('')}</div>
      <div class="energy-insight">${ei.ins}</div>
    </div>
  </div>

  <div class="diary-label">Урок дня</div>
  <textarea class="diary-ta" rows="3" placeholder="Что я понял сегодня..." onchange="setDiary(${selDay},'lesson',this.value)">${(w.mood[selDay]||{}).lesson||''}</textarea>
  <div class="diary-label">Благодарность</div>
  <textarea class="diary-ta" rows="3" placeholder="За что я благодарен..." onchange="setDiary(${selDay},'gratitude',this.value)">${(w.mood[selDay]||{}).gratitude||''}</textarea>`;
}

async function renderCoach(){
  const ei=getEI(),s=calcStats(wOff),x=xpd();
  const corr=Math.round((ei.en/10)*s.pct);
  document.getElementById('ps').innerHTML=`
  <div class="coach-hero">
    <div class="coach-top">
      <div class="coach-ava">🤖</div>
      <div><div class="coach-info-name">AI-Коуч</div><div class="coach-info-sub">Анализ твоей недели</div></div>
    </div>
    <div class="coach-text loading" id="coachTxt">Анализирую данные...</div>
    <button class="coach-action" onclick="renderCoach()">🔄 Обновить анализ</button>
  </div>

  <div class="energy-rating">
    <div class="card-top" style="padding:0;margin-bottom:14px"><div class="card-title">Рейтинг энергии</div></div>
    <div class="er-row"><span class="er-label">Средний сон</span><span class="er-val">${ei.sl}/10</span></div>
    <div class="er-track"><div class="er-fill" style="width:${ei.sl*10}%"></div></div>
    <div class="er-row"><span class="er-label">Средняя энергия</span><span class="er-val">${ei.en}/10</span></div>
    <div class="er-track"><div class="er-fill" style="width:${ei.en*10}%"></div></div>
    <div class="er-row"><span class="er-label">Среднее настроение</span><span class="er-val">${ei.mo}/10</span></div>
    <div class="er-track"><div class="er-fill" style="width:${ei.mo*10}%"></div></div>
    <div style="margin-top:6px;font-size:13px;color:var(--text3)">Связь энергии и продуктивности: <b style="color:var(--accent)">${corr}%</b></div>
  </div>

  <div class="sec-label">Резервное копирование</div>
  <div class="backup-row">
    <button class="backup-btn green" onclick="exportData()">💾 Сохранить данные</button>
    <button class="backup-btn" onclick="importData()">📂 Восстановить</button>
  </div>`;

  const h=hb(),dates=wDates(wOff);
  const hStats=h.list.map(n=>{const days=dates.map(d=>(h.days[fmt(d)]||[])[h.list.indexOf(n)]||false);return n+':'+days.filter(Boolean).length+'/7';}).join(', ');

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:250,messages:[{role:'user',content:`Ты личный коуч. Проанализируй неделю и дай рекомендации на русском. Данные: задачи ${s.pct}%, цели ${s.gd}/${s.gt}, привычки: ${hStats}, сон ${ei.sl}/10, энергия ${ei.en}/10, настроение ${ei.mo}/10, уровень XP ${x.level}. Дай 3 конкретных совета. До 80 слов.`}]})});
    const data=await res.json();
    const txt=data.content?.[0]?.text||localAdvice(s,ei);
    const el=document.getElementById('coachTxt');
    if(el){el.textContent=txt;el.classList.remove('loading');}
  }catch{
    const el=document.getElementById('coachTxt');
    if(el){el.textContent=localAdvice(s,ei);el.classList.remove('loading');}
  }
}

function localAdvice(s,ei){
  const lines=[];
  lines.push(s.pct>=70?'🔥 Отличная неделя — '+s.pct+'% задач выполнено!':s.pct>=40?'💪 Неплохо: '+s.pct+'%. Есть куда расти.':'📈 '+s.pct+'% — начни с 3 главных задач в день.');
  lines.push(ei.sl<=5?'💤 Недосып — главный враг. +1 час сна = +20% продуктивности.':ei.en<=5?'⚡ Низкая энергия. Попробуй прогулку и меньше экрана.':'✅ Энергия в норме. Поддерживай ритм.');
  lines.push('🎯 На следующую неделю: выбери 1 главный приоритет и не отступай.');
  return lines.join('\n\n');
}

function go(p){
  page=p;em=false;
  document.getElementById('editBtn').textContent='Изменить';
  document.getElementById('editBtn').classList.remove('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+p).classList.add('active');
  document.getElementById('weekNav').classList.toggle('hidden',!['week','habits','diary'].includes(p));
  document.getElementById('fab').classList.toggle('hidden',['xp','coach'].includes(p));
  render();
}

function render(){
  const dates=wDates(wOff);
  document.getElementById('weekLabel').textContent=fmt(dates[0])+'–'+fmt(dates[6]);
  updXP();
  ({week:renderWeek,habits:renderHabits,diary:renderDiary,storage:renderStorage,xp:renderXP,coach:renderCoach}[page]||renderWeek)();
}

const _t=new Date().getDay();selDay=_t===0?6:_t-1;

// ── ДОСТУП ──
// Ключи генерирует бот командой /adduser
// Формат ключа: OL-XXXXXX-YYYYYYYY
// Проверка: ключ должен начинаться с OL- и быть длиной 20 символов

function checkAccess(){
  const saved=ld('ol_access',null);
  if(saved&&saved.exp>Date.now()&&saved.u&&saved.k){
    return validateKey(saved.u, saved.k);
  }
  return false;
}

function validateKey(username, key){
  // Базовая проверка формата: OL-XXXXXX-YYYYYYYY
  if(!key||!key.startsWith('OL-'))return false;
  const parts=key.split('-');
  if(parts.length!==3)return false;
  if(parts[1].length!==6||parts[2].length!==8)return false;
  // Проверка что ключ содержит только допустимые символы
  const valid=/^[A-Z0-9]+$/.test(parts[1])&&/^[A-Z0-9]+$/.test(parts[2]);
  return valid&&username.length>=2;
}

function doLogin(){
  const u=document.getElementById('li_u').value.trim().toLowerCase().replace('@','');
  const c=document.getElementById('li_c').value.trim().toUpperCase();
  const err=document.getElementById('li_err');

  if(!u||!c){err.textContent='Заполните все поля';return;}
  if(!validateKey(u,c)){
    err.textContent='Неверный формат кода. Пример: OL-ABC123-DEF45678';
    return;
  }
  sv('ol_access',{u,k:c,exp:Date.now()+365*24*60*60*1000});
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('fab').style.display='flex';
  updXP();render();
}

function doLogout(){
  localStorage.removeItem('ol_access');
  location.reload();
}

window.addEventListener('load',()=>{
  const splash=document.getElementById('splash');
  setTimeout(()=>{
    splash.style.opacity='0';
    setTimeout(()=>{
      splash.style.display='none';
      if(checkAccess()){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('app').style.display='flex';
        document.getElementById('fab').style.display='flex';
        updXP();render();
      } else {
        document.getElementById('loginScreen').style.display='flex';
        document.getElementById('app').style.display='none';
        document.getElementById('fab').style.display='none';
        setTimeout(()=>document.getElementById('li_u').focus(),100);
      }
    },600);
  },900);
});

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none')doLogin();
});
