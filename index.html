<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ONE LIFE">
<meta name="theme-color" content="#080808">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<title>ONE LIFE</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@600;700;800&display=swap');

:root {
  --bg:      #080808;
  --bg2:     #101010;
  --bg3:     #181818;
  --bg4:     #222;
  --bg5:     #2a2a2a;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --border3: rgba(255,255,255,0.22);
  --text:    #F0F0F0;
  --text2:   #888;
  --text3:   #444;
  --accent:  #7C6EFF;
  --accent2: #5A4FD8;
  --glow:    rgba(124,110,255,0.35);
  --green:   #34D399;
  --green2:  rgba(52,211,153,0.12);
  --amber:   #FBBF24;
  --amber2:  rgba(251,191,36,0.12);
  --red:     #F87171;
  --red2:    rgba(248,113,113,0.10);
  --purple:  #C084FC;
  --purple2: rgba(192,132,252,0.12);
  --glass:   rgba(255,255,255,0.05);
  --glass2:  rgba(255,255,255,0.08);
  --r:       14px;
  --r-lg:    20px;
  --r-xl:    26px;
  --tab-h:   84px;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:15px;overflow:hidden;overscroll-behavior:none}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;opacity:0;transition:opacity 0.4s ease}
#app.visible{opacity:1}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;height:calc(58px + var(--safe-top));padding-top:var(--safe-top);background:rgba(8,8,8,0.88);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:0.5px solid var(--border);display:flex;align-items:flex-end;padding-bottom:11px;padding-left:18px;padding-right:18px;z-index:10}
.topbar-logo{font-family:'Manrope',sans-serif;font-size:16px;font-weight:800;letter-spacing:3px;flex:1}
.topbar-logo span{background:linear-gradient(135deg,#7C6EFF,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-right{display:flex;align-items:center;gap:8px}
.week-nav{display:flex;align-items:center;gap:5px}
.week-nav button{background:var(--glass2);border:0.5px solid var(--border2);color:var(--text2);font-size:15px;width:28px;height:28px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;backdrop-filter:blur(8px)}
.week-nav button:active{transform:scale(0.92)}
.week-nav .wlbl{font-size:11px;color:var(--text2);min-width:80px;text-align:center;font-weight:500}
.xp-pill{display:flex;align-items:center;gap:5px;background:var(--amber2);border:0.5px solid rgba(251,191,36,0.22);border-radius:20px;padding:4px 10px;cursor:pointer}
.xp-pill-lv{font-size:11px;font-weight:700;color:var(--amber);font-family:'Manrope',sans-serif}
.xp-pill-bar{width:36px;height:3px;background:rgba(251,191,36,0.18);border-radius:2px;overflow:hidden}
.xp-pill-fill{height:100%;background:linear-gradient(90deg,var(--amber),#F97316);border-radius:2px;transition:width 0.6s cubic-bezier(.4,0,.2,1)}
.edit-btn{background:var(--glass2);border:0.5px solid var(--border2);border-radius:9px;padding:4px 11px;color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;backdrop-filter:blur(8px);transition:all 0.15s}
.edit-btn.active{color:var(--red);border-color:rgba(248,113,113,0.3);background:var(--red2)}

/* ── SCROLL ── */
.page-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:18px 14px calc(var(--tab-h) + var(--safe-bot) + 12px)}

/* ── TABBAR ── */
.tabbar{flex-shrink:0;height:calc(var(--tab-h) + var(--safe-bot));padding-bottom:var(--safe-bot);background:rgba(8,8,8,0.94);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:0.5px solid var(--border);display:flex;align-items:flex-start;padding-top:10px;z-index:10}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:2px 0;transition:all 0.2s}
.tab-btn .ti{font-size:21px;line-height:1;transition:transform 0.25s cubic-bezier(.34,1.56,.64,1)}
.tab-btn .tl{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:0.3px;transition:color 0.15s}
.tab-btn.active .tl{color:var(--accent)}
.tab-btn:not(.active) .ti{opacity:0.3}
.tab-btn.active .ti{transform:scale(1.15)}

/* ── CARDS ── */
.card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden;margin-bottom:12px;transition:border-color 0.2s}
.card-top{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.9px}
.card-badge{font-size:11px;font-weight:600;color:var(--accent);background:rgba(124,110,255,0.12);border-radius:8px;padding:3px 8px}

/* ── HERO STATS ── */
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.hero-stat{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:16px;transition:transform 0.2s,box-shadow 0.2s}
.hero-stat:active{transform:scale(0.97)}
.hero-stat-lbl{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:8px;letter-spacing:0.5px;text-transform:uppercase}
.hero-stat-val{font-family:'Manrope',sans-serif;font-size:36px;font-weight:800;line-height:1}
.hero-stat-val.blue{background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-stat-val.amber{background:linear-gradient(135deg,var(--amber),#F97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-stat-sub{font-size:11px;color:var(--text3);margin-top:6px}
.mini-bar{height:3px;background:var(--bg4);border-radius:2px;margin-top:10px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px;transition:width 0.6s cubic-bezier(.4,0,.2,1)}

/* ── GOALS ── */
.goal-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border)}
.goal-row:last-child{border-bottom:none}
.gcheck{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all 0.25s cubic-bezier(.34,1.56,.64,1)}
.gcheck.done{background:linear-gradient(135deg,var(--green),#10B981);border-color:var(--green);color:#000;transform:scale(1.05)}
.ginput{flex:1;background:none;border:none;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;outline:none}
.ginput::placeholder{color:var(--text3)}
.ginput.done{text-decoration:line-through;color:var(--text3)}
.del-btn{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;opacity:0;transition:all 0.15s;flex-shrink:0;line-height:1}
.edit-mode .del-btn{opacity:1;color:var(--red)}

/* ── DAY SELECTOR ── */
.day-strip{display:flex;gap:7px;overflow-x:auto;padding:0 0 2px;scrollbar-width:none;margin-bottom:14px}
.day-strip::-webkit-scrollbar{display:none}
.day-chip{flex-shrink:0;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid var(--border);border-radius:14px;padding:9px 13px;cursor:pointer;text-align:center;min-width:50px;transition:all 0.2s cubic-bezier(.4,0,.2,1)}
.day-chip.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent);box-shadow:0 4px 16px var(--glow)}
.day-chip .dn{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.3px}
.day-chip .dd{font-size:10px;color:var(--text3);margin-top:2px}
.day-chip.active .dn,.day-chip.active .dd{color:#fff}
.day-chip.today:not(.active) .dn{color:var(--accent)}
.day-chip.today:not(.active){border-color:rgba(124,110,255,0.3)}

/* ── TASKS ── */
.task-row{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:0.5px solid var(--border);transition:background 0.15s}
.task-row:last-child{border-bottom:none}
.task-row:active{background:var(--glass2)}
.tcheck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all 0.25s cubic-bezier(.34,1.56,.64,1);cursor:pointer}
.tcheck.done{background:linear-gradient(135deg,var(--green),#10B981);border-color:var(--green);color:#000;transform:scale(1.05)}
.task-text{flex:1;font-size:15px;color:var(--text)}
.task-text.done{text-decoration:line-through;color:var(--text3)}
.task-actions{display:flex;align-items:center;gap:6px}
.focus-btn{background:rgba(124,110,255,0.1);border:0.5px solid rgba(124,110,255,0.25);border-radius:7px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all 0.15s;color:var(--accent)}
.focus-btn:active{transform:scale(0.9)}
.add-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;opacity:0.7;transition:opacity 0.15s}
.add-row:active{opacity:1}
.add-circle{width:22px;height:22px;border-radius:50%;background:none;border:1.5px dashed var(--border3);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);flex-shrink:0}
.add-row span{font-size:14px;color:var(--text3)}

/* ── BAR CHART ── */
.bar-section{padding:16px}
.bar-chart{display:flex;gap:6px;align-items:flex-end;height:80px;margin-bottom:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bar-track{width:100%;flex:1;background:var(--bg4);border-radius:6px 6px 0 0;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.bar-fill{width:100%;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:6px 6px 0 0;transition:height 0.6s cubic-bezier(.4,0,.2,1);min-height:0}
.bar-fill.today-bar{background:linear-gradient(180deg,var(--purple),var(--accent))}
.bar-lbl{font-size:9px;color:var(--text3);font-weight:500}

/* ── HABITS ── */
.habit-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--border);border-radius:var(--r-xl);padding:14px 16px;margin-bottom:10px;transition:all 0.2s}
.habit-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.habit-name{font-size:15px;font-weight:500;flex:1}
.habit-streak{font-size:12px;font-weight:700;color:var(--amber);background:var(--amber2);border-radius:8px;padding:3px 8px;border:0.5px solid rgba(251,191,36,0.15)}
.habit-days{display:flex;gap:5px}
.hday{flex:1;aspect-ratio:1;border-radius:11px;background:var(--bg4);border:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;transition:all 0.2s cubic-bezier(.34,1.56,.64,1)}
.hday:active{transform:scale(0.88)}
.hday.done{background:var(--green2);border-color:rgba(52,211,153,0.3);box-shadow:0 2px 8px rgba(52,211,153,0.15)}
.hday .hd-lbl{font-size:8px;font-weight:600;color:var(--text3);letter-spacing:0.3px}
.hday .hd-dot{width:5px;height:5px;border-radius:50%;background:var(--border2)}
.hday.done .hd-dot{background:var(--green)}

/* ── MOOD ── */
.mood-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.mood-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:13px 8px;text-align:center}
.mood-icon{font-size:20px;margin-bottom:5px}
.mood-lbl{font-size:9px;color:var(--text3);font-weight:600;margin-bottom:7px;letter-spacing:0.5px;text-transform:uppercase}
.mood-val{font-family:'Manrope',sans-serif;font-size:30px;font-weight:800;line-height:1;margin-bottom:9px}
.mood-btns{display:flex;gap:5px;justify-content:center}
.mood-btns button{width:28px;height:28px;border-radius:9px;background:var(--glass2);border:0.5px solid var(--border2);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;transition:all 0.15s;backdrop-filter:blur(8px)}
.mood-btns button:active{transform:scale(0.88)}

/* ── ENERGY CHART ── */
.energy-wrap{padding:16px}
.energy-legend{display:flex;gap:14px;margin-bottom:12px}
.e-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-weight:500}
.e-dot{width:7px;height:7px;border-radius:50%}
.chart-area{height:100px;position:relative;margin-bottom:8px}
.chart-area svg{width:100%;height:100%}
.chart-days{display:flex;justify-content:space-between}
.chart-day{font-size:9px;color:var(--text3);font-weight:500}
.energy-insight{background:var(--glass);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-top:12px;font-size:13px;color:var(--text2);line-height:1.6;border-left:2px solid var(--accent)}

/* ── DIARY ── */
.diary-ta{width:100%;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid var(--border);border-radius:var(--r);padding:13px 15px;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;resize:none;outline:none;margin-bottom:10px;-webkit-appearance:none;line-height:1.6;transition:border-color 0.2s}
.diary-ta:focus{border-color:rgba(124,110,255,0.4)}
.diary-ta::placeholder{color:var(--text3)}
.diary-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:7px;padding-left:2px}

/* ── MONTH ── */
.month-cat{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden;margin-bottom:10px}
.month-cat-head{padding:13px 16px 11px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.month-cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.month-cat-name{font-size:13px;font-weight:600;flex:1}
.month-cat-count{font-size:11px;color:var(--text3)}
.month-task-row{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:0.5px solid var(--border)}
.month-task-row:last-child{border-bottom:none}
.m-dot{width:7px;height:7px;border-radius:50%;background:var(--border3);flex-shrink:0;cursor:pointer;transition:all 0.2s}
.m-dot.done{background:var(--green)}
.m-inp{flex:1;background:none;border:none;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none}
.m-inp::placeholder{color:var(--text3)}
.m-inp.done{text-decoration:line-through;color:var(--text3)}

/* ── STORAGE ── */
.storage-item{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:0.5px solid var(--border)}
.storage-item:last-child{border-bottom:none}
.s-check{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all 0.25s cubic-bezier(.34,1.56,.64,1)}
.s-check.done{background:var(--green2);border-color:var(--green);color:var(--green)}
.s-inp{flex:1;background:none;border:none;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none}
.s-inp.done{text-decoration:line-through;color:var(--text3)}

/* ── XP SCREEN ── */
.xp-hero{background:linear-gradient(135deg,rgba(124,110,255,0.15),rgba(192,132,252,0.08));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(124,110,255,0.2);border-radius:var(--r-xl);padding:28px 20px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.xp-hero::before{content:'';position:absolute;top:-40%;left:-20%;width:140%;height:200%;background:radial-gradient(ellipse at 50% 0%,rgba(124,110,255,0.12),transparent 60%);pointer-events:none}
.xp-hero-num{font-family:'Manrope',sans-serif;font-size:72px;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--amber),#F97316,var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative}
.xp-hero-title{font-size:16px;font-weight:600;color:var(--text2);margin-top:4px;margin-bottom:16px;font-family:'Manrope',sans-serif}
.xp-hero-sub{font-size:12px;color:var(--text3);margin-bottom:12px}
.xp-hero-track{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin-bottom:8px;overflow:hidden}
.xp-hero-prog{height:100%;background:linear-gradient(90deg,var(--amber),#F97316);border-radius:3px;transition:width 0.8s cubic-bezier(.4,0,.2,1)}
.xp-hero-pts{font-size:11px;color:var(--text3)}
.achiev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.achiev{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 6px;text-align:center;transition:all 0.2s;opacity:0.4}
.achiev.done{opacity:1;border-color:rgba(251,191,36,0.3);background:var(--amber2);box-shadow:0 0 12px rgba(251,191,36,0.15)}
.achiev-ic{font-size:22px;margin-bottom:4px}
.achiev-nm{font-size:9px;color:var(--text2);font-weight:500;line-height:1.3}
.xp-log{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden}
.xp-log-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--border)}
.xp-log-item:last-child{border-bottom:none}
.xp-log-text{font-size:14px;color:var(--text)}
.xp-log-date{font-size:11px;color:var(--text3);margin-top:2px}
.xp-log-pts{font-size:14px;font-weight:700;color:var(--amber)}

/* ── COACH SCREEN ── */
.coach-hero{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--border);border-radius:var(--r-xl);padding:20px;margin-bottom:14px}
.coach-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.coach-ava{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.coach-info-name{font-weight:700;font-size:15px;font-family:'Manrope',sans-serif}
.coach-info-sub{font-size:12px;color:var(--text3);margin-top:2px}
.coach-text{font-size:14px;line-height:1.7;color:var(--text2);white-space:pre-wrap}
.coach-text.loading{color:var(--text3);font-style:italic}
.coach-action{margin-top:14px;background:var(--glass2);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px 16px;color:var(--text2);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;width:100%;text-align:left;transition:all 0.15s;backdrop-filter:blur(8px)}
.coach-action:active{background:var(--glass);transform:scale(0.99)}
.energy-rating{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--border);border-radius:var(--r-xl);padding:16px;margin-bottom:14px}
.er-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;color:var(--text2)}
.er-val{font-weight:600;color:var(--text)}
.er-track{height:4px;background:var(--bg4);border-radius:2px;margin-bottom:12px;overflow:hidden}
.er-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:2px;transition:width 0.6s}
.backup-row{display:flex;gap:10px;margin-bottom:14px}
.backup-btn{flex:1;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid var(--border);border-radius:var(--r);padding:12px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;color:var(--text2);text-align:center;transition:all 0.15s}
.backup-btn.green{color:var(--green);border-color:rgba(52,211,153,0.2);background:var(--green2)}
.backup-btn:active{transform:scale(0.97)}

/* ── FOCUS TIMER MODAL ── */
.focus-modal{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;padding-bottom:0}
.focus-modal-bg{position:absolute;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.focus-modal-sheet{position:relative;z-index:1;width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:24px 20px calc(32px + var(--safe-bot));animation:slideUp 0.35s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.focus-task-name{font-size:14px;color:var(--text2);margin-bottom:6px;text-align:center}
.focus-timer{font-family:'Manrope',sans-serif;font-size:64px;font-weight:800;text-align:center;margin:16px 0;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.focus-progress{height:5px;background:var(--bg4);border-radius:3px;margin-bottom:20px;overflow:hidden}
.focus-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:3px;transition:width 1s linear}
.focus-btns{display:flex;gap:10px}
.focus-btn-big{flex:1;padding:14px;border-radius:var(--r);font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:none;transition:all 0.2s;color:#fff}
.focus-btn-big.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 20px var(--glow)}
.focus-btn-big.danger{background:var(--glass2);border:0.5px solid var(--border2);color:var(--text2);backdrop-filter:blur(8px)}
.focus-btn-big:active{transform:scale(0.97)}

/* ── INPUT MODAL ── */
.modal{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.modal-sheet{position:relative;z-index:1;width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px;padding-bottom:calc(16px + var(--safe-bot));animation:slideUp 0.3s cubic-bezier(.4,0,.2,1)}
.modal-input{width:100%;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid var(--border2);border-radius:var(--r);padding:14px 16px;color:var(--text);font-size:16px;font-family:'Inter',sans-serif;outline:none;margin-bottom:12px;transition:border-color 0.2s;-webkit-appearance:none}
.modal-input:focus{border-color:rgba(124,110,255,0.4)}
.modal-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r);padding:14px;color:#fff;font-size:16px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px var(--glow)}
.modal-btn:active{transform:scale(0.98)}

/* ── CTX MENU ── */
.ctx-menu{position:fixed;z-index:200;background:rgba(20,20,20,0.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:0.5px solid var(--border2);border-radius:var(--r-lg);padding:6px;min-width:180px;animation:fadeScale 0.2s cubic-bezier(.34,1.56,.64,1)}
@keyframes fadeScale{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
.ctx-item{padding:11px 14px;border-radius:10px;font-size:14px;cursor:pointer;color:var(--text);transition:background 0.1s;display:flex;align-items:center;gap:10px}
.ctx-item:active{background:var(--glass2)}
.ctx-item.red{color:var(--red)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bot) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(24,24,24,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--border2);border-radius:20px;padding:10px 18px;font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;opacity:0;transition:all 0.3s cubic-bezier(.4,0,.2,1);z-index:300;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── XP POPUP ── */
.xp-popup{position:fixed;top:calc(60px + var(--safe-top) + 16px);left:50%;transform:translateX(-50%) translateY(-10px);background:var(--amber2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(251,191,36,0.3);border-radius:20px;padding:8px 16px;font-size:13px;font-weight:700;color:var(--amber);white-space:nowrap;opacity:0;transition:all 0.35s cubic-bezier(.34,1.56,.64,1);z-index:200;pointer-events:none}
.xp-popup.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LEVEL UP MODAL ── */
.lvlup{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.lvlup-card{background:var(--bg2);border:0.5px solid rgba(251,191,36,0.4);border-radius:var(--r-xl);padding:36px 28px;text-align:center;animation:fadeScale 0.4s cubic-bezier(.34,1.56,.64,1);max-width:300px;width:90%;box-shadow:0 0 40px rgba(251,191,36,0.2)}
.lvlup-emoji{font-size:56px;margin-bottom:12px}
.lvlup-title{font-family:'Manrope',sans-serif;font-size:22px;font-weight:800;color:var(--amber);margin-bottom:6px}
.lvlup-sub{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.5}
.lvlup-btn{background:linear-gradient(135deg,var(--amber),#F97316);border:none;border-radius:var(--r);padding:14px 32px;font-size:16px;font-weight:700;color:#000;cursor:pointer;font-family:'Manrope',sans-serif;transition:transform 0.2s;width:100%}
.lvlup-btn:active{transform:scale(0.97)}

/* ── FAB ── */
#fab{position:fixed;right:18px;bottom:calc(var(--tab-h) + var(--safe-bot) + 14px);z-index:50;width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px var(--glow);transition:all 0.25s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent}
#fab:active{transform:scale(0.90)}

/* ── CONFETTI ── */
.confetti-piece{position:fixed;top:-10px;width:8px;height:8px;border-radius:2px;z-index:500;pointer-events:none;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── LOGIN SCREEN ── */
#loginScreen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:flex-end;justify-content:center;padding:0}
.login-bg{position:absolute;inset:0;overflow:hidden}
.login-orb1{position:absolute;width:300px;height:300px;background:radial-gradient(circle,rgba(124,110,255,0.25),transparent 70%);top:-80px;left:-60px;border-radius:50%}
.login-orb2{position:absolute;width:250px;height:250px;background:radial-gradient(circle,rgba(192,132,252,0.2),transparent 70%);bottom:30%;right:-50px;border-radius:50%}
.login-sheet{position:relative;z-index:1;width:100%;background:rgba(12,12,12,0.96);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:0.5px solid var(--border2);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:32px 24px calc(40px + var(--safe-bot));animation:slideUp 0.5s cubic-bezier(.4,0,.2,1)}
.login-logo{font-family:'Manrope',sans-serif;font-size:28px;font-weight:800;letter-spacing:4px;text-align:center;margin-bottom:6px}
.login-logo span{background:linear-gradient(135deg,#7C6EFF,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-tagline{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px;font-weight:400}
.login-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px;padding-left:2px}
.login-input{width:100%;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid var(--border2);border-radius:var(--r);padding:14px 16px;color:var(--text);font-size:16px;font-family:'Inter',sans-serif;outline:none;margin-bottom:16px;transition:border-color 0.2s;-webkit-appearance:none}
.login-input:focus{border-color:rgba(124,110,255,0.4);background:rgba(255,255,255,0.07)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r);padding:15px;color:#fff;font-size:16px;font-weight:700;font-family:'Manrope',sans-serif;cursor:pointer;transition:all 0.2s;box-shadow:0 6px 24px var(--glow);margin-bottom:14px}
.login-btn:active{transform:scale(0.98)}
.login-err{font-size:13px;color:var(--red);text-align:center;min-height:18px;margin-bottom:8px}
.login-tg{display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;color:var(--text3)}
.login-tg a{color:var(--accent);text-decoration:none;font-weight:500}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:2000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;transition:opacity 0.5s}
.splash-logo{font-family:'Manrope',sans-serif;font-size:28px;font-weight:800;letter-spacing:5px}
.splash-logo span{background:linear-gradient(135deg,#7C6EFF,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.splash-dot{display:flex;gap:6px;margin-top:12px}
.splash-dot span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:dotBounce 1.2s ease-in-out infinite}
.splash-dot span:nth-child(2){animation-delay:0.15s}
.splash-dot span:nth-child(3){animation-delay:0.3s}
@keyframes dotBounce{0%,80%,100%{transform:scale(0.6);opacity:0.3}40%{transform:scale(1);opacity:1}}

/* ── SEC LABEL ── */
.sec-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-left:2px}

/* ── WEEK SUMMARY CARD ── */
.week-summary{background:linear-gradient(135deg,rgba(124,110,255,0.1),rgba(192,132,252,0.06));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(124,110,255,0.18);border-radius:var(--r-xl);padding:16px;margin-bottom:14px}
.week-summary-title{font-size:11px;font-weight:600;color:rgba(124,110,255,0.8);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
.week-summary-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;font-size:13px}
.week-summary-row:last-child{margin-bottom:0}
.ws-label{color:var(--text3)}
.ws-val{font-weight:600;color:var(--text)}
.ws-val.good{color:var(--green)}
.ws-val.warn{color:var(--amber)}

/* ── API KEY BLOCK ── */
.apikey-block{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--border);border-radius:var(--r-xl);padding:16px;margin-bottom:14px}
.apikey-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.apikey-row{display:flex;gap:8px}
.apikey-input{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px 13px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.apikey-input:focus{border-color:rgba(124,110,255,0.4)}
.apikey-save{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r);padding:10px 16px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:transform 0.15s}
.apikey-save:active{transform:scale(0.96)}
.apikey-hint{font-size:11px;color:var(--text3);margin-top:7px;line-height:1.5}
.apikey-hint a{color:var(--accent);text-decoration:none}

/* ── CALENDAR BUTTON ── */
.cal-btn{background:var(--glass2);border:0.5px solid var(--border2);border-radius:10px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;backdrop-filter:blur(8px);transition:all 0.18s;flex-shrink:0;position:relative}
.cal-btn:active{transform:scale(0.88)}
.cal-btn.open{background:rgba(124,110,255,0.18);border-color:rgba(124,110,255,0.4)}

/* ── CALENDAR PANEL ── */
.cal-panel{position:fixed;top:calc(var(--safe-top) + 62px);right:12px;width:310px;background:rgba(14,14,14,0.97);backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);border:0.5px solid var(--border2);border-radius:var(--r-xl);z-index:500;overflow:hidden;transform-origin:top right;transition:transform 0.3s cubic-bezier(.34,1.56,.64,1),opacity 0.25s ease}
.cal-panel.hidden{transform:scale(0.85) translateY(-8px);opacity:0;pointer-events:none}
.cal-panel.visible{transform:scale(1) translateY(0);opacity:1}

/* ── CALENDAR HEADER ── */
.cal-header{display:flex;align-items:center;padding:14px 14px 10px;gap:4px}
.cal-nav{background:var(--glass2);border:0.5px solid var(--border2);border-radius:9px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--text2);flex-shrink:0;transition:all 0.15s;backdrop-filter:blur(8px)}
.cal-nav:active{transform:scale(0.88)}
.cal-nav:disabled{opacity:0.25;cursor:default}
.cal-title{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer}
.cal-month-name{font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;color:var(--text);letter-spacing:0.2px;line-height:1}
.cal-year-name{font-size:11px;font-weight:600;color:var(--accent)}
.cal-title:active .cal-month-name,.cal-title:active .cal-year-name{opacity:0.7}

/* ── DAY NAMES ROW ── */
.cal-daynames{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px 6px;gap:2px}
.cal-dn{text-align:center;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:0.4px;padding:3px 0}
.cal-dn.weekend{color:rgba(248,113,113,0.5)}

/* ── DAYS GRID ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px 12px;gap:3px}
.cal-cell{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);transition:all 0.18s;position:relative}
.cal-cell:active{transform:scale(0.88)}
.cal-cell.other-month{color:var(--text3);opacity:0.4}
.cal-cell.today{color:var(--accent);font-weight:700}
.cal-cell.today::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-cell.in-sel-week{background:rgba(124,110,255,0.1);color:var(--text)}
.cal-cell.sel-day{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;box-shadow:0 2px 10px var(--glow)}
.cal-cell.sel-day::after{display:none}
.cal-cell:not(.sel-day):not(.in-sel-week):hover{background:var(--glass2)}
.cal-cell.future{opacity:0.2;cursor:default;pointer-events:none}

/* ── YEAR PICKER ── */
.year-picker{padding:8px 10px 14px;border-top:0.5px solid var(--border)}
.year-picker-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;text-align:center;margin-bottom:10px}
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.year-cell{padding:9px 4px;border-radius:10px;text-align:center;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.15s;border:0.5px solid transparent}
.year-cell:active{transform:scale(0.93)}
.year-cell.cur-year{color:var(--accent);font-weight:700;border-color:rgba(124,110,255,0.3);background:rgba(124,110,255,0.08)}
.year-cell.sel-year{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700}
.year-cell:not(.sel-year):hover{background:var(--glass2)}
.year-cell.future-year{opacity:0.2;cursor:default;pointer-events:none}

/* ── MONTH PICKER ── */
.month-picker{padding:8px 10px 14px;border-top:0.5px solid var(--border)}
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.month-cell{padding:10px 4px;border-radius:10px;text-align:center;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.15s;border:0.5px solid transparent}
.month-cell:active{transform:scale(0.93)}
.month-cell.cur-month{color:var(--accent);border-color:rgba(124,110,255,0.3);background:rgba(124,110,255,0.08)}
.month-cell.sel-month{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700}
.month-cell.future-month{opacity:0.2;cursor:default;pointer-events:none}

/* ── SYNC DOT ── */
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background 0.4s,box-shadow 0.4s;flex-shrink:0}
.sync-dot.syncing{background:var(--amber);box-shadow:0 0 6px var(--amber);animation:pulse 1s ease-in-out infinite}
.sync-dot.synced{background:var(--green);box-shadow:0 0 6px rgba(52,211,153,0.5)}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* ── FIREBASE SETUP ── */
.fb-setup{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--border);border-radius:var(--r-xl);padding:16px;margin-bottom:14px}
.fb-setup-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.fb-setup-desc{font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:12px}
.fb-setup-desc a{color:var(--accent);text-decoration:none}
.fb-inp{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px 13px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;margin-bottom:8px;transition:border-color 0.2s;-webkit-appearance:none}
.fb-inp:focus{border-color:rgba(124,110,255,0.4)}
.fb-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r);padding:11px;color:#fff;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:transform 0.15s;box-shadow:0 4px 16px var(--glow)}
.fb-btn:active{transform:scale(0.97)}
.fb-status{font-size:12px;margin-top:8px;text-align:center;min-height:16px;color:var(--text3)}
.fb-status.ok{color:var(--green)}
.fb-status.err{color:var(--red)}
/* ── HIDDEN ── */
.hidden{display:none!important}

@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>
</head>

</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none">
  <div class="login-bg">
    <div class="login-orb1"></div>
    <div class="login-orb2"></div>
  </div>
  <div class="login-sheet">

<script>
// ── CONSTANTS ──
const DAYS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const LVL_NAMES=['Новичок','Ученик','Практик','Знаток','Мастер','Эксперт','Профи','Элита','Легенда','Бог продуктивности'];
const ACHIEV=[
  {id:'first_task',ic:'✅',n:'Первый шаг'},
  {id:'week_50',ic:'🎯',n:'50% недели'},
  {id:'week_100',ic:'🏆',n:'Идеальная неделя'},
  {id:'habit_7',ic:'🔥',n:'Неделя привычки'},
  {id:'habit_21',ic:'💎',n:'21 день'},
  {id:'xp_100',ic:'⚡',n:'100 XP'},
  {id:'xp_500',ic:'🚀',n:'500 XP'},
  {id:'level_3',ic:'🌟',n:'Уровень 3'},
  {id:'level_5',ic:'👑',n:'Уровень 5'},
  {id:'diary_7',ic:'📓',n:'Дневник недели'},
  {id:'goals_5',ic:'🎪',n:'5 целей'},
  {id:'storage_10',ic:'💡',n:'10 идей'}
];

// ── STATE ──
let page='week', wOff=0, selDay=0, em=false;
let focusInterval=null, focusTotal=25*60, focusLeft=focusTotal, focusRunning=false;

// ── LOCAL STORAGE ──
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const svLocal=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

// ── FIREBASE SYNC ──
let fbDb=null, fbUid=null, fbReady=false, syncQ=new Set();

function setSyncDot(state){
  const d=document.getElementById('syncDot');
  if(!d)return;
  d.className='sync-dot'+(state?' '+state:'');
}

async function hashKey(key){
  try{
    const enc=new TextEncoder().encode(key);
    const buf=await crypto.subtle.digest('SHA-256',enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,40);
  }catch{return btoa(key).replace(/[^a-z0-9]/gi,'').slice(0,40);}
}

function fbPath(k){return 'u/'+fbUid+'/'+k.replace(/[.#$\[\]/]/g,'_');}

async function initFirebase(activationKey){
  const cfg=ld('fb_cfg',null);
  if(!cfg||!cfg.databaseURL)return;
  try{
    if(!firebase.apps.length)firebase.initializeApp(cfg);
    fbDb=firebase.database();
    fbUid=await hashKey(activationKey);
    fbReady=true;
    setSyncDot('syncing');
    // Pull all cloud data first, then merge (cloud wins for existing keys)
    const snap=await fbDb.ref('u/'+fbUid).get();
    if(snap.exists()){
      const data=snap.val();
      Object.entries(data).forEach(([k,v])=>{
        // restore original key name (underscores back to dots for wk_ keys)
        const orig=k.replace(/^wk_minus/,'wk_-');
        svLocal(orig,v);
      });
      setSyncDot('synced');
      render();
    }else{
      // First time on this device — push local data to cloud
      pushAllToCloud();
    }
    // Real-time listener for changes from other devices
    fbDb.ref('u/'+fbUid).on('value',snap=>{
      if(!snap.exists())return;
      const data=snap.val();
      let changed=false;
      Object.entries(data).forEach(([k,v])=>{
        const orig=k.startsWith('wk_minus')?k.replace('wk_minus','wk_-'):k;
        const cur=localStorage.getItem(orig);
        const newStr=JSON.stringify(v);
        if(cur!==newStr){svLocal(orig,v);changed=true;}
      });
      if(changed)render();
      setSyncDot('synced');
    });
  }catch(e){fbReady=false;setSyncDot('error');console.warn('Firebase:',e);}
}

function pushAllToCloud(){
  if(!fbDb||!fbUid)return;
  const keys=['hb2','st','xp','achievements','claude_key'];
  for(let i=-52;i<=0;i++){keys.push('wk_'+i);}
  const updates={};
  keys.forEach(k=>{
    const v=localStorage.getItem(k);
    if(v)try{updates[fbPath(k)]=JSON.parse(v);}catch{}
  });
  fbDb.ref().update(updates).then(()=>setSyncDot('synced')).catch(()=>setSyncDot('error'));
}

const sv=(k,v)=>{
  svLocal(k,v);
  if(fbReady&&fbDb&&fbUid){
    setSyncDot('syncing');
    fbDb.ref(fbPath(k)).set(v)
      .then(()=>setSyncDot('synced'))
      .catch(()=>setSyncDot('error'));
  }
};

// ── WEEK DATA ──
function mkWeek(){return{goals:['','','','',''],goalsD:[false,false,false,false,false],tasks:[[],[],[],[],[],[],[]],tasksD:[[],[],[],[],[],[],[]],mood:Array(7).fill(null)};}
function wk(off){return ld('wk_'+off,mkWeek());}
function swk(off,w){sv('wk_'+off,w);}
function wDates(off){const d=new Date();d.setDate(d.getDate()-(d.getDay()||7)+1+off*7);return Array(7).fill(0).map((_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x;});}
function fmt(d){return d.getDate()+'.'+(d.getMonth()+1);}
function isToday(d){const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth();}

// ── HABITS ──
function hb(){return ld('hb2',{list:['Спорт','Чтение','Медитация'],days:{}});}
function shb(h){sv('hb2',h);}

// ── STORAGE ──
function st(){return ld('st',[]);}
function sst(s){sv('st',s);}

// ── XP ──
function xpNeeded(lv){return 100+lv*50;}
function xpd(){return ld('xp',{total:0,level:1,hist:[]});}
function addXP(pts,reason){
  const x=xpd(), prevLv=x.level;
  x.total+=pts;
  const need=xpNeeded(x.level);
  if(x.total>=need){x.total-=need;x.level++;}
  x.hist.unshift({p:pts,r:reason,d:new Date().toLocaleDateString('ru')});
  if(x.hist.length>50)x.hist.pop();
  sv('xp',x);
  showXpPop('+'+pts+' XP');
  if(x.level>prevLv)showLevelUp(x.level);
  checkAchievements();
  updXP();
}
function updXP(){
  const x=xpd(),need=xpNeeded(x.level),pct=Math.min(100,Math.round(x.total/need*100));
  const lv=document.getElementById('xpLv'),bar=document.getElementById('xpBar');
  if(lv)lv.textContent=x.level;
  if(bar)bar.style.width=pct+'%';
}

// ── ACHIEVEMENTS ──
function checkAchievements(){
  const done=ld('achievements',[]);
  const unlock=(id)=>{if(!done.includes(id)){done.push(id);sv('achievements',done);showToast('🏆 Достижение: '+ACHIEV.find(a=>a.id===id)?.n);}};
  const x=xpd();
  if(x.hist.length>=1)unlock('first_task');
  if(x.hist.reduce((s,i)=>s+i.p,0)>=100)unlock('xp_100');
  if(x.hist.reduce((s,i)=>s+i.p,0)>=500)unlock('xp_500');
  if(x.level>=3)unlock('level_3');
  if(x.level>=5)unlock('level_5');
  const s2=calcStats(wOff);
  if(s2.pct>=50)unlock('week_50');
  if(s2.pct>=100)unlock('week_100');
  const s3=st();
  if(s3.length>=10)unlock('storage_10');
}

// ── STATS ──
function calcStats(off){
  const w=wk(off);
  let tot=0,don=0,gt=0,gd=0;
  for(let di=0;di<7;di++){const ts=w.tasks[di]||[];ts.forEach((t,ti)=>{if(t){tot++;if(w.tasksD[di][ti])don++;}});}
  w.goals.forEach((g,i)=>{if(g){gt++;if(w.goalsD[i])gd++;}});
  return{tot,don,pct:tot>0?Math.round(don/tot*100):0,gt,gd};
}

// ── ENERGY INDEX ──
function getEI(){
  const w=wk(wOff);
  const vals=w.mood.map(x=>x||{sleep:7,energy:7,mood:7});
  const avg=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length*10)/10:7;
  const sl=avg(vals.map(v=>v.sleep));
  const en=avg(vals.map(v=>v.energy));
  const mo=avg(vals.map(v=>v.mood));
  let ins='';
  if(en>=8&&sl>=8)ins='🌟 Отличная неделя по энергии! Ты в потоке.';
  else if(sl<5)ins='💤 Мало сна влияет на всё. Попробуй лечь на час раньше.';
  else if(en<5)ins='⚡ Энергия ниже нормы. Сделай паузу и подвигайся.';
  else ins='✅ Показатели в норме. Поддерживай ритм.';
  return{sl,en,mo,ins};
}

// ── ACTIONS ──
function toggleGoal(i){const w=wk(wOff);w.goalsD[i]=!w.goalsD[i];if(w.goalsD[i])addXP(20,'Цель недели');swk(wOff,w);render();confettiIfDone(w.goalsD);}
function setGoal(i,v){const w=wk(wOff);w.goals[i]=v;swk(wOff,w);}
function addGoal(){const w=wk(wOff);if(w.goals.length<8)w.goals.push(''),w.goalsD.push(false);swk(wOff,w);render();}
function toggleTask(di,ti){const w=wk(wOff);w.tasksD[di][ti]=!w.tasksD[di][ti];if(w.tasksD[di][ti])addXP(10,'Задача выполнена');swk(wOff,w);render();}
function toggleHabit(hi,di){
  const h=hb(),dates=wDates(wOff),key=fmt(dates[di]);
  if(!h.days[key])h.days[key]=[];
  h.days[key][hi]=!h.days[key][hi];
  if(h.days[key][hi])addXP(15,'Привычка отмечена');
  shb(h);render();
}
function adjMood(di,k,d){const w=wk(wOff);if(!w.mood[di])w.mood[di]={sleep:7,energy:7,mood:7,lesson:'',gratitude:''};w.mood[di][k]=Math.max(1,Math.min(10,(w.mood[di][k]||7)+d));swk(wOff,w);render();}
function setDiary(di,k,v){const w=wk(wOff);if(!w.mood[di])w.mood[di]={sleep:7,energy:7,mood:7,lesson:'',gratitude:''};w.mood[di][k]=v;swk(wOff,w);}
function toggleSt(i){const s=st();s[i].done=!s[i].done;sst(s);render();}
function editSt(i,v){const s=st();s[i].text=v;sst(s);}
function selD(i){selDay=i;render();}

// ── ADD MODAL ──
let addTarget=null;
function openAdd(){
  addTarget=page;
  const m=document.createElement('div');m.className='modal';m.id='addModal';
  const labels={week:'Новая задача',habits:'Новая привычка',storage:'Новая идея'};
  m.innerHTML='<div class="modal-bg" onclick="closeAdd()"></div><div class="modal-sheet"><input class="modal-input" id="addInp" placeholder="'+(labels[page]||'Добавить...')+'" autocomplete="off" autocorrect="off" spellcheck="false"><button class="modal-btn" onclick="confirmAdd()">Добавить</button></div>';
  document.body.appendChild(m);
  setTimeout(()=>document.getElementById('addInp')?.focus(),200);
}
function closeAdd(){document.getElementById('addModal')?.remove();}
function confirmAdd(){
  const v=document.getElementById('addInp')?.value.trim();
  if(!v){closeAdd();return;}
  if(addTarget==='week'){const w=wk(wOff);w.tasks[selDay].push(v);w.tasksD[selDay].push(false);swk(wOff,w);}
  else if(addTarget==='habits'){const h=hb();h.list.push(v);shb(h);}
  else if(addTarget==='storage'){const s=st();s.unshift({text:v,done:false});sst(s);}
  addXP(5,'Добавлено');closeAdd();render();
}

// ── CTX MENU ──
let ctxData=null;
function showCtx(type,data){
  const existing=document.getElementById('ctxMenu');if(existing)existing.remove();
  const bg2=document.getElementById('ctxBg');if(bg2)bg2.remove();
  ctxData={type,...data};
  const m=document.createElement('div');m.id='ctxMenu';m.className='ctx-menu';
  m.style.cssText='bottom:calc(var(--tab-h) + var(--safe-bot) + 60px);right:18px';
  const items=[];
  if(type==='task')items.push(['⏱️ Фокус 25 мин','startFocus(ctxData.text);closeCtx()'],['🗑️ Удалить','deleteCtx()',true]);
  else items.push(['✏️ Изменить','editCtx()'],['🗑️ Удалить','deleteCtx()',true]);
  m.innerHTML=items.map(([label,fn,red])=>'<div class="ctx-item '+(red?'red':'')+'" onclick="'+fn+'">'+label+'</div>').join('');
  const bg=document.createElement('div');bg.style.cssText='position:fixed;inset:0;z-index:199';bg.onclick=closeCtx;bg.id='ctxBg';
  document.body.append(bg,m);
}
function closeCtx(){document.getElementById('ctxMenu')?.remove();document.getElementById('ctxBg')?.remove();}
function deleteCtx(){
  if(!ctxData)return;
  const{type}=ctxData;
  if(type==='task'){const w=wk(wOff);w.tasks[ctxData.di].splice(ctxData.ti,1);w.tasksD[ctxData.di].splice(ctxData.ti,1);swk(wOff,w);}
  else if(type==='goal'){const w=wk(wOff);w.goals.splice(ctxData.ci,1);w.goalsD.splice(ctxData.ci,1);swk(wOff,w);}
  else if(type==='habit'){const h=hb();h.list.splice(ctxData.hi,1);shb(h);}
  else if(type==='stor'){const s=st();s.splice(ctxData.si,1);sst(s);}
  closeCtx();render();showToast('Удалено');
}
function editCtx(){
  if(!ctxData)return;
  const old=ctxData.text||'';
  const inp=prompt('Изменить:',old);
  if(inp===null||inp===old)return;
  const{type}=ctxData;
  if(type==='goal'){const w=wk(wOff);w.goals[ctxData.ci]=inp;swk(wOff,w);}
  else if(type==='habit'){const h=hb();h.list[ctxData.hi]=inp;shb(h);}
  else if(type==='stor'){const s=st();s[ctxData.si].text=inp;sst(s);}
  closeCtx();render();
}

// ── FOCUS TIMER ──
function startFocus(taskName){
  focusLeft=focusTotal=25*60;focusRunning=false;
  clearInterval(focusInterval);
  const mod=document.createElement('div');mod.className='focus-modal';mod.id='focusModal';
  mod.innerHTML='<div class="focus-modal-bg" onclick="stopFocus()"></div><div class="focus-modal-sheet"><div class="focus-task-name">'+taskName+'</div><div class="focus-timer" id="focusClock">25:00</div><div class="focus-progress"><div class="focus-prog-fill" id="focusProg" style="width:100%"></div></div><div class="focus-btns"><button class="focus-btn-big primary" id="focusToggle" onclick="toggleFocus()">&#9654; Старт</button><button class="focus-btn-big danger" onclick="stopFocus()">Отмена</button></div></div>';
  document.body.appendChild(mod);
}
function toggleFocus(){
  focusRunning=!focusRunning;
  const btn=document.getElementById('focusToggle');
  if(btn)btn.textContent=focusRunning?'⏸ Пауза':'▶ Продолжить';
  if(focusRunning){
    focusInterval=setInterval(()=>{
      if(!focusRunning)return;
      focusLeft--;
      const m=String(Math.floor(focusLeft/60)).padStart(2,'0');
      const s=String(focusLeft%60).padStart(2,'0');
      const cl=document.getElementById('focusClock');
      const pg=document.getElementById('focusProg');
      if(cl)cl.textContent=m+':'+s;
      if(pg)pg.style.width=(focusLeft/focusTotal*100)+'%';
      if(focusLeft<=0){clearInterval(focusInterval);stopFocus();addXP(50,'Фокус 25 мин');showToast('🎯 Фокус завершён! +50 XP');try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch{}}
    },1000);
  }else{clearInterval(focusInterval);}
}
function stopFocus(){clearInterval(focusInterval);focusRunning=false;document.getElementById('focusModal')?.remove();}

// ── UI FEEDBACK ──
let toastT=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);
}
let xpT=null;
function showXpPop(msg){
  const p=document.getElementById('xpPop');
  p.textContent=msg;p.classList.add('show');
  clearTimeout(xpT);xpT=setTimeout(()=>p.classList.remove('show'),1500);
}
function showLevelUp(lv){
  const name=LVL_NAMES[Math.min(lv-1,LVL_NAMES.length-1)];
  const mod=document.createElement('div');mod.className='lvlup';
  mod.innerHTML='<div class="lvlup-card"><div class="lvlup-emoji">🎉</div><div class="lvlup-title">Уровень '+lv+'!</div><div class="lvlup-sub">Ты стал «'+name+'».<br>Продолжай в том же духе!</div><button class="lvlup-btn" onclick="this.closest(\'.lvlup\').remove()">Отлично!</button></div>';
  document.body.appendChild(mod);confetti();
}
function confettiIfDone(arr){if(arr.filter(Boolean).length===arr.length&&arr.length>0)confetti();}
function confetti(){
  const colors=['#7C6EFF','#C084FC','#FBBF24','#34D399','#F87171','#60A5FA'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText='left:'+Math.random()*100+'vw;background:'+colors[Math.floor(Math.random()*colors.length)]+';animation-duration:'+(1.5+Math.random()*1.5)+'s;animation-delay:'+Math.random()*0.5+'s;width:'+(6+Math.random()*6)+'px;height:'+(6+Math.random()*6)+'px;border-radius:'+(Math.random()>0.5?'50%':'2px');
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3500);
  }
}

// ── WEEK SHIFT ──
function shiftWeek(d){
  wOff+=d;
  if(wOff===0)selDay=(new Date().getDay()||7)-1;
  render();
}

// ── TOGGLE EDIT ──
function toggleEdit(){
  em=!em;
  const btn=document.getElementById('editBtn');
  btn.textContent=em?'Готово':'Изменить';
  btn.classList.toggle('active',em);
  render();
}

// ── BACKUP ──
function exportData(){
  const keys=['hb2','st','xp','achievements'];
  const data={v:2,date:new Date().toISOString(),weeks:{}};
  for(let i=-52;i<=52;i++){const k='wk_'+i,v=localStorage.getItem(k);if(v)data.weeks[k]=JSON.parse(v);}
  keys.forEach(k=>{const v=localStorage.getItem(k);if(v)data[k]=JSON.parse(v);});
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='onelife_backup.json';a.click();
  URL.revokeObjectURL(url);showToast('✅ Сохранено');
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.weeks)Object.entries(d.weeks).forEach(([k,v])=>sv(k,v));
        ['hb2','st','xp','achievements'].forEach(k=>{if(d[k])sv(k,d[k]);});
        showToast('✅ Восстановлено');setTimeout(()=>render(),400);
      }catch{alert('Ошибка файла');}
    };r.readAsText(f);
  };inp.click();
}

function localAdvice(s,ei){
  const tips=[];
  if(s.pct>=80)tips.push('🔥 Неделя на уровне! '+s.pct+'% задач — ты в потоке. Поставь ещё одну амбициозную цель.');
  else if(s.pct>=50)tips.push('💪 '+s.pct+'% задач выполнено. Выбери 3 главных задачи на завтра и закрой их до полудня.');
  else tips.push('📈 '+s.pct+'% — начни с малого. Поставь 2-3 задачи на день и выполни их полностью.');
  if(ei.sl<=5)tips.push('💤 Недосып — главный враг продуктивности. Ляг спать на 1 час раньше — и результаты вырастут.');
  else if(ei.en<=5)tips.push('⚡ Низкая энергия. Попробуй 10-минутную прогулку перед работой — это работает лучше кофе.');
  else tips.push('✅ Энергия в норме. Используй утренние часы для самых важных задач — тогда ты на пике.');
  tips.push('🎯 На следующую неделю: выбери 1 главный приоритет и не отступай от него, что бы ни случилось.');
  return tips.join('\n\n');
}

function checkAccess(){
  const saved=ld('ol_access',null);
  if(saved&&saved.exp>Date.now()&&saved.u&&saved.k)return validateKey(saved.u,saved.k);
  return false;
}
function validateKey(username,key){
  if(!key||!key.startsWith('OL-'))return false;
  const parts=key.split('-');
  if(parts.length!==3)return false;
  if(parts[1].length!==6||parts[2].length!==8)return false;
  return /^[A-Z0-9]+$/.test(parts[1])&&/^[A-Z0-9]+$/.test(parts[2])&&username.length>=2;
}
function doLogin(){
  const u=document.getElementById('li_u').value.trim().toLowerCase().replace('@','');
  const c=document.getElementById('li_c').value.trim().toUpperCase();
  const err=document.getElementById('li_err');
  if(!u||!c){err.textContent='Заполните все поля';return;}
  if(!validateKey(u,c)){err.textContent='Неверный формат. Пример: OL-ABC123-DEF45678';return;}
  svLocal('ol_access',{u,k:c,exp:Date.now()+365*24*60*60*1000});
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('fab').style.display='flex';
  setTimeout(()=>{document.getElementById('app').classList.add('visible');},50);
  initFirebase(c);
  updXP();render();
}

// ── CALENDAR ──
const MONTHS_RU=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_SHORT=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

let calOpen=false, calPickerMode=null; // null | 'year' | 'month'
const _now=new Date();
let calYear=_now.getFullYear(), calMonth=_now.getMonth(); // 0-indexed

function toggleCal(){calOpen?closeCal():openCal();}

function openCal(){
  calOpen=true;
  // sync calendar view to currently selected week
  const dates=wDates(wOff);
  const mid=dates[selDay]||dates[0];
  calYear=mid.getFullYear();calMonth=mid.getMonth();
  document.getElementById('calPanel').className='cal-panel visible';
  document.getElementById('calBg').style.display='block';
  document.getElementById('calBtn').classList.add('open');
  calPickerMode=null;
  document.getElementById('calPicker').className='hidden';
  renderCalGrid();
}

function closeCal(){
  calOpen=false;
  document.getElementById('calPanel').className='cal-panel hidden';
  document.getElementById('calBg').style.display='none';
  document.getElementById('calBtn').classList.remove('open');
  calPickerMode=null;
}

function calShiftMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  calPickerMode=null;
  document.getElementById('calPicker').className='hidden';
  renderCalGrid();
}

function toggleCalPicker(){
  if(calPickerMode==='year'){calPickerMode='month';renderCalPicker();}
  else if(calPickerMode==='month'){calPickerMode=null;document.getElementById('calPicker').className='hidden';}
  else{calPickerMode='year';renderCalPicker();}
}

function renderCalPicker(){
  const el=document.getElementById('calPicker');
  el.className='';
  if(calPickerMode==='year'){
    const curY=_now.getFullYear();
    const years=[];for(let y=curY+3;y>=curY-12;y--)years.push(y);
    el.innerHTML='<div class="year-picker"><div class="year-picker-title">Выбери год</div><div class="year-grid">'+
      years.map(y=>'<div class="year-cell'+(y===curY?' cur-year':'')+(y===calYear?' sel-year':'')+'" onclick="selCalYear('+y+')">'+y+'</div>').join('')+
    '</div></div>';
  }else if(calPickerMode==='month'){
    el.innerHTML='<div class="month-picker"><div class="year-picker-title">'+calYear+'</div><div class="month-grid">'+
      MONTHS_SHORT.map((m,i)=>'<div class="month-cell'+(_now.getFullYear()===calYear&&i===_now.getMonth()?' cur-month':'')+(i===calMonth?' sel-month':'')+'" onclick="selCalMonth('+i+')">'+m+'</div>').join('')+
    '</div></div>';
  }
}

function selCalYear(y){calYear=y;calPickerMode='month';renderCalPicker();}
function selCalMonth(m){calMonth=m;calPickerMode=null;document.getElementById('calPicker').className='hidden';renderCalGrid();}

function renderCalGrid(){
  const curY=_now.getFullYear(),curM=_now.getMonth(),curD=_now.getDate();
  document.getElementById('calMonthName').textContent=MONTHS_RU[calMonth];
  document.getElementById('calYearName').textContent=calYear;
  document.getElementById('calPrev').disabled=calYear<2020;

  // Get selected week's Monday and Sunday
  const selDates=wDates(wOff);
  const selMon=selDates[0],selSun=selDates[6];

  // First day of the month (0=Sun…6=Sat → convert to Mon-first: 0=Mon…6=Sun)
  const firstDay=new Date(calYear,calMonth,1);
  let startDow=firstDay.getDay();// 0=Sun
  startDow=startDow===0?6:startDow-1;// Mon=0

  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const totalCells=Math.ceil((startDow+daysInMonth)/7)*7;

  let html='';
  for(let i=0;i<totalCells;i++){
    let day,month,year,otherMonth=false;
    if(i<startDow){day=daysInPrev-startDow+i+1;month=calMonth-1;year=calYear;otherMonth=true;}
    else if(i>=startDow+daysInMonth){day=i-startDow-daysInMonth+1;month=calMonth+1;year=calYear;otherMonth=true;}
    else{day=i-startDow+1;month=calMonth;year=calYear;}
    if(month<0){month=11;year--;}
    if(month>11){month=0;year++;}

    const cellDate=new Date(year,month,day);
    cellDate.setHours(0,0,0,0);
    const today=new Date();today.setHours(0,0,0,0);

    const isToday=cellDate.getTime()===today.getTime();
    const isFuture=cellDate>today;
    const mon=new Date(cellDate);mon.setDate(cellDate.getDate()-((cellDate.getDay()||7)-1));
    const isInSelWeek=mon.getTime()===selMon.getTime()&&!otherMonth;
    const isSelDay=!otherMonth&&year===selDates[selDay].getFullYear()&&month===selDates[selDay].getMonth()&&day===selDates[selDay].getDate();

    const cls=['cal-cell',otherMonth?'other-month':'',isToday?'today':'',isInSelWeek&&!isSelDay?'in-sel-week':'',isSelDay?'sel-day':''].filter(Boolean).join(' ');
    const onclick=otherMonth?'':'onclick="calSelectDay('+year+','+(month)+','+day+')"';
    html+='<div class="'+cls+'" '+onclick+'>'+day+'</div>';
  }
  document.getElementById('calGrid').innerHTML=html;
}

function calSelectDay(year,month,day){
  const target=new Date(year,month,day);
  target.setHours(0,0,0,0);
  // Compute wOff: difference in weeks from current week's Monday
  const today=new Date();
  const curMon=new Date(today);
  curMon.setDate(today.getDate()-((today.getDay()||7)-1));
  curMon.setHours(0,0,0,0);
  const targetMon=new Date(target);
  targetMon.setDate(target.getDate()-((target.getDay()||7)-1));
  targetMon.setHours(0,0,0,0);
  const newWOff=Math.round((targetMon-curMon)/(7*24*60*60*1000));
  wOff=newWOff;
  selDay=(target.getDay()||7)-1; // 0=Mon…6=Sun
  closeCal();
  go(page);
}

// ── FIREBASE SETUP UI ──
function fbSetupHtml(){
  const cfg=ld('fb_cfg',null);
  const hasDb=cfg&&cfg.databaseURL;
  const statusCls=fbReady?'ok':hasDb?'err':'';
  const statusTxt=fbReady?'✅ Подключено — данные синхронизируются':hasDb?'⚠️ Ошибка подключения. Проверь URL':'';
  return '<div class="fb-setup">'+
    '<div class="fb-setup-title"><div class="sync-dot '+(fbReady?'synced':hasDb?'error':'')+'" style="position:static"></div> Синхронизация между устройствами</div>'+
    '<div class="fb-setup-desc">Создай бесплатный проект на <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> → Realtime Database → скопируй URL базы.</div>'+
    '<input class="fb-inp" id="fbUrlInp" placeholder="https://your-app-default-rtdb.firebaseio.com" value="'+(hasDb?cfg.databaseURL:'')+'" autocomplete="off" autocorrect="off" spellcheck="false">'+
    '<input class="fb-inp" id="fbApiInp" placeholder="Web API Key (из настроек проекта)" value="'+(cfg?.apiKey||'')+'" autocomplete="off" spellcheck="false">'+
    '<button class="fb-btn" onclick="saveFbConfig()">Подключить синхронизацию</button>'+
    '<div class="fb-status '+statusCls+'">'+statusTxt+'</div>'+
  '</div>';
}

async function saveFbConfig(){
  const url=(document.getElementById('fbUrlInp')?.value||'').trim();
  const key=(document.getElementById('fbApiInp')?.value||'').trim();
  if(!url||!url.startsWith('https://')){showToast('⚠️ Введи корректный URL базы');return;}
  const cfg={apiKey:key,databaseURL:url,projectId:url.split('.')[0].replace('https://','')};
  svLocal('fb_cfg',cfg);
  showToast('🔄 Подключаюсь...');
  const acc=ld('ol_access',null);
  if(acc?.k){
    fbDb=null;fbUid=null;fbReady=false;
    if(firebase.apps.length)firebase.apps.forEach(a=>a.delete().catch(()=>{}));
    setTimeout(async()=>{await initFirebase(acc.k);renderCoach();},600);
  }
}

// ── API KEY ──
function saveApiKey(){
  const v=document.getElementById('apikeyInp')?.value.trim();
  if(v!==undefined){sv('claude_key',v);showToast(v?'🔑 Ключ сохранён':'🗑️ Ключ удалён');if(v)renderCoach();}
}
