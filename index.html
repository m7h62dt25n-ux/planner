<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ONE LIFE">
<meta name="theme-color" content="#080808">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<title>ONE LIFE</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@600;700;800;900&display=swap');

:root {
  /* iOS 26 True Black */
  --bg:      #000000;
  --bg2:     #0A0A0A;
  --bg3:     #111111;
  --bg4:     #1C1C1E;
  --bg5:     #2C2C2E;

  /* iOS 26 borders — hairline */
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.13);
  --border3: rgba(255,255,255,0.22);

  /* iOS text hierarchy */
  --text:    #FFFFFF;
  --text2:   rgba(235,235,245,0.6);
  --text3:   rgba(235,235,245,0.3);

  /* Accents */
  --accent:  #6E5BFF;
  --accent2: #4F40D8;
  --glow:    rgba(110,91,255,0.40);
  --cyan:    #32D2FF;
  --cyan2:   rgba(50,210,255,0.15);
  --green:   #30D158;
  --green2:  rgba(48,209,88,0.14);
  --amber:   #FFD60A;
  --amber2:  rgba(255,214,10,0.14);
  --red:     #FF453A;
  --red2:    rgba(255,69,58,0.12);
  --purple:  #BF5AF2;
  --purple2: rgba(191,90,242,0.14);

  /* iOS 26 Liquid Glass material */
  --glass:      rgba(255,255,255,0.06);
  --glass2:     rgba(255,255,255,0.10);
  --glass3:     rgba(255,255,255,0.16);
  --glass-fill: rgba(28,28,30,0.72);

  /* Radii */
  --r:       14px;
  --r-lg:    20px;
  --r-xl:    26px;

  /* Tab bar — floating pill height */
  --tab-h:   72px;
  --tab-pill-h: 60px;

  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:#000;color:var(--text);font-family:-apple-system,'Inter',sans-serif;font-size:16px;overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased}

/* ── AURORA — subtle iOS wallpaper glow ── */
#aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:orbFloat linear infinite}
.orb1{width:480px;height:480px;background:radial-gradient(circle,rgba(110,91,255,0.22),transparent 70%);top:-120px;left:-80px;animation-duration:25s;animation-name:orbFloat1}
.orb2{width:360px;height:360px;background:radial-gradient(circle,rgba(191,90,242,0.16),transparent 70%);bottom:-60px;right:-60px;animation-duration:32s;animation-delay:-10s;animation-name:orbFloat2}
.orb3{width:280px;height:280px;background:radial-gradient(circle,rgba(50,210,255,0.10),transparent 70%);top:45%;left:50%;animation-duration:40s;animation-delay:-18s;animation-name:orbFloat3}
@keyframes orbFloat1{0%{transform:translate(0,0)}33%{transform:translate(50px,35px)}66%{transform:translate(-25px,60px)}100%{transform:translate(0,0)}}
@keyframes orbFloat2{0%{transform:translate(0,0)}33%{transform:translate(-45px,-55px)}66%{transform:translate(35px,-15px)}100%{transform:translate(0,0)}}
@keyframes orbFloat3{0%{transform:translate(-50%,-50%) scale(1)}33%{transform:translate(-50%,-50%) scale(1.12)}66%{transform:translate(-50%,-50%) scale(0.92)}100%{transform:translate(-50%,-50%) scale(1)}}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;opacity:0;transition:opacity 0.4s ease;position:relative;z-index:1}
#app.visible{opacity:1}

/* ── TOPBAR — iOS 26 Large Title style ── */
.topbar{flex-shrink:0;height:calc(56px + var(--safe-top));padding-top:var(--safe-top);background:rgba(0,0,0,0.72);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border-bottom:0.33px solid rgba(255,255,255,0.12);display:flex;align-items:flex-end;padding-bottom:10px;padding-left:20px;padding-right:16px;z-index:10}
.topbar-logo{font-family:-apple-system,'Manrope',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;flex:1;color:#fff}
.topbar-logo span{color:var(--accent);-webkit-text-fill-color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:6px}

/* Week nav */
.week-nav{display:flex;align-items:center;gap:3px}
.week-nav button{background:rgba(255,255,255,0.08);border:0.33px solid rgba(255,255,255,0.14);color:var(--text2);font-size:16px;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;backdrop-filter:blur(20px)}
.week-nav button:active{background:rgba(255,255,255,0.18);transform:scale(0.88)}
.week-nav .wlbl{font-size:12px;color:var(--text2);min-width:78px;text-align:center;font-weight:500}

/* XP pill — iOS capsule */
.xp-pill{display:flex;align-items:center;gap:5px;background:rgba(255,214,10,0.10);border:0.33px solid rgba(255,214,10,0.28);border-radius:100px;padding:5px 11px;cursor:pointer;transition:all 0.18s;backdrop-filter:blur(20px)}
.xp-pill:active{transform:scale(0.93);background:rgba(255,214,10,0.18)}
.xp-pill-lv{font-size:12px;font-weight:700;color:var(--amber);font-variant-numeric:tabular-nums}
.xp-pill-bar{width:34px;height:2.5px;background:rgba(255,214,10,0.18);border-radius:100px;overflow:hidden}
.xp-pill-fill{height:100%;background:linear-gradient(90deg,var(--amber),#FF9F0A);border-radius:100px;transition:width 0.7s cubic-bezier(.4,0,.2,1)}

/* Edit button — iOS tint button */
.edit-btn{background:none;border:none;border-radius:0;padding:6px 8px;color:var(--accent);font-size:14px;font-weight:500;cursor:pointer;font-family:-apple-system,'Inter',sans-serif;transition:opacity 0.15s}
.edit-btn:active{opacity:0.5}
.edit-btn.active{color:var(--red)}

/* ── SCROLL ── */
.page-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:16px 16px calc(var(--tab-h) + var(--safe-bot) + 28px)}

/* ── TABBAR — iOS 26 Floating Pill ── */
.tabbar{
  position:fixed;
  bottom:calc(var(--safe-bot) + 12px);
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 32px);
  max-width:460px;
  height:var(--tab-pill-h);
  background:rgba(28,28,30,0.78);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border:0.33px solid rgba(255,255,255,0.18);
  border-radius:100px;
  display:flex;
  align-items:center;
  padding:0 8px;
  z-index:100;
  box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.06) inset;
  /* Specular highlight top edge */
  background-image:linear-gradient(to bottom,rgba(255,255,255,0.10) 0px,transparent 1px);
}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 0 6px;transition:all 0.2s cubic-bezier(.34,1.56,.64,1);border-radius:100px;position:relative;-webkit-tap-highlight-color:transparent}
.tab-btn .ti{font-size:22px;line-height:1;transition:transform 0.28s cubic-bezier(.34,1.56,.64,1),opacity 0.18s}
.tab-btn .tl{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:0px;transition:color 0.18s,opacity 0.18s}
.tab-btn.active .tl{color:var(--accent)}
.tab-btn:not(.active) .ti{opacity:0.35}
.tab-btn.active .ti{transform:scale(1.12)}
.tab-btn:active{transform:scale(0.92)}

/* ── CARDS — iOS 26 Liquid Glass ── */
.card{
  background:rgba(28,28,30,0.70);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border:0.33px solid rgba(255,255,255,0.14);
  border-radius:var(--r-xl);
  overflow:hidden;
  margin-bottom:12px;
  position:relative;
  /* Specular top highlight */
  background-image:linear-gradient(to bottom,rgba(255,255,255,0.07) 0px,transparent 1px);
}
.card-top{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;position:relative;z-index:1}
.card-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0px;text-transform:none}
.card-badge{font-size:12px;font-weight:600;color:var(--text2);background:rgba(255,255,255,0.08);border-radius:100px;padding:2px 10px;border:0.33px solid rgba(255,255,255,0.12)}

/* ── HERO STATS ── */
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.hero-stat{
  background:rgba(28,28,30,0.70);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border:0.33px solid rgba(255,255,255,0.14);
  border-radius:var(--r-lg);
  padding:18px 16px 16px;
  transition:transform 0.2s;
  position:relative;
  overflow:hidden;
  background-image:linear-gradient(to bottom,rgba(255,255,255,0.06) 0px,transparent 1px);
}
.hero-stat:active{transform:scale(0.96)}
.hero-stat-lbl{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:6px}
.hero-stat-val{font-family:-apple-system,'Manrope',sans-serif;font-size:42px;font-weight:700;line-height:1;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.hero-stat-val.blue{color:#fff}
.hero-stat-val.amber{color:var(--amber)}
.hero-stat-sub{font-size:12px;color:var(--text3);margin-top:5px}
.mini-bar{height:2px;background:rgba(255,255,255,0.08);border-radius:100px;margin-top:10px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:100px;transition:width 0.7s cubic-bezier(.4,0,.2,1)}

/* ── GOALS ── */
.goal-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.33px solid rgba(255,255,255,0.08);transition:background 0.12s;position:relative;z-index:1}
.goal-row:last-child{border-bottom:none}
.gcheck{width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.22);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:all 0.28s cubic-bezier(.34,1.56,.64,1)}
.gcheck.done{background:var(--green);border-color:var(--green);color:#000;transform:scale(1.08)}
.ginput{flex:1;background:none;border:none;color:var(--text);font-size:16px;font-family:-apple-system,'Inter',sans-serif;outline:none;font-weight:400}
.ginput::placeholder{color:var(--text3)}
.ginput.done{text-decoration:line-through;color:var(--text3)}
.del-btn{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;opacity:0;transition:all 0.15s;flex-shrink:0;line-height:1}
.edit-mode .del-btn{opacity:1;color:var(--red)}

/* ── DAY SELECTOR — iOS segmented/chips ── */
.day-strip{display:flex;gap:6px;overflow-x:auto;padding:0 0 2px;scrollbar-width:none;margin-bottom:12px}
.day-strip::-webkit-scrollbar{display:none}
.day-chip{flex-shrink:0;background:rgba(28,28,30,0.65);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:0.33px solid rgba(255,255,255,0.12);border-radius:100px;padding:8px 14px;cursor:pointer;text-align:center;min-width:50px;transition:all 0.2s cubic-bezier(.34,1.56,.64,1)}
.day-chip:active{transform:scale(0.92)}
.day-chip.active{background:var(--accent);border-color:rgba(110,91,255,0.4);box-shadow:0 4px 16px rgba(110,91,255,0.35)}
.day-chip .dn{font-size:11px;font-weight:600;color:var(--text2)}
.day-chip .dd{font-size:10px;color:var(--text3);margin-top:1px}
.day-chip.active .dn,.day-chip.active .dd{color:#fff;font-weight:600}
.day-chip.today:not(.active) .dn{color:var(--accent)}
.day-chip.today:not(.active){border-color:rgba(110,91,255,0.3)}

/* ── TASKS ── */
.task-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.33px solid rgba(255,255,255,0.08);transition:background 0.12s;position:relative;z-index:1}
.task-row:last-child{border-bottom:none}
.task-row:active{background:rgba(255,255,255,0.04)}
.tcheck{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.22);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all 0.25s cubic-bezier(.34,1.56,.64,1);cursor:pointer}
.tcheck.done{background:var(--green);border-color:var(--green);color:#000;transform:scale(1.06)}
.task-text{flex:1;font-size:16px;color:var(--text);font-weight:400;line-height:1.35}
.task-text.done{text-decoration:line-through;color:var(--text3)}
.task-actions{display:flex;align-items:center;gap:6px}
.focus-btn{background:rgba(110,91,255,0.12);border:0.33px solid rgba(110,91,255,0.25);border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all 0.15s;color:var(--accent)}
.focus-btn:active{transform:scale(0.88)}
.add-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:opacity 0.15s;position:relative;z-index:1}
.add-row:active{opacity:0.6}
.add-circle{width:22px;height:22px;border-radius:50%;background:rgba(110,91,255,0.16);border:none;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--accent);flex-shrink:0;font-weight:600}
.add-row span{font-size:15px;color:var(--accent);font-weight:400}

/* ── BAR CHART ── */
.bar-section{padding:12px 16px 16px}
.bar-chart{display:flex;gap:5px;align-items:stretch;height:80px;margin-bottom:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-track{width:100%;flex:1;min-height:0;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;display:flex;flex-direction:column}
.bar-spacer{width:100%;flex-shrink:0;transition:flex-grow 0.7s cubic-bezier(.4,0,.2,1)}
.bar-fill{width:100%;flex-shrink:0;background:var(--accent);border-radius:6px;transition:flex-grow 0.7s cubic-bezier(.4,0,.2,1)}
.bar-fill.today-bar{background:var(--cyan)}
.bar-lbl{font-size:10px;color:var(--text3);font-weight:400;flex-shrink:0}

/* ── HABITS ── */
.habit-card{background:rgba(28,28,30,0.70);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.14);border-radius:var(--r-xl);padding:14px 16px;margin-bottom:10px;position:relative;overflow:hidden;background-image:linear-gradient(to bottom,rgba(255,255,255,0.06) 0px,transparent 1px)}
.habit-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.habit-name{font-size:16px;font-weight:500;flex:1;color:var(--text)}
.habit-streak{font-size:12px;font-weight:600;color:var(--amber);background:rgba(255,214,10,0.12);border-radius:100px;padding:3px 10px;border:0.33px solid rgba(255,214,10,0.22)}
.habit-days{display:flex;gap:5px}
.hday{flex:1;aspect-ratio:1;border-radius:12px;background:rgba(255,255,255,0.06);border:0.33px solid rgba(255,255,255,0.10);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;transition:all 0.22s cubic-bezier(.34,1.56,.64,1)}
.hday:active{transform:scale(0.88)}
.hday.done{background:rgba(48,209,88,0.18);border-color:rgba(48,209,88,0.32)}
.hday .hd-lbl{font-size:8px;font-weight:500;color:var(--text3)}
.hday .hd-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.18);transition:all 0.22s}
.hday.done .hd-dot{background:var(--green)}

/* ── MOOD ── */
.mood-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.mood-card{background:rgba(28,28,30,0.70);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.12);border-radius:var(--r-lg);padding:14px 8px;text-align:center;background-image:linear-gradient(to bottom,rgba(255,255,255,0.06) 0px,transparent 1px)}
.mood-icon{font-size:24px;margin-bottom:4px}
.mood-lbl{font-size:10px;color:var(--text3);font-weight:500;margin-bottom:6px}
.mood-val{font-size:34px;font-weight:700;line-height:1;margin-bottom:10px;font-variant-numeric:tabular-nums;color:var(--text)}
.mood-btns{display:flex;gap:5px;justify-content:center}
.mood-btns button{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.08);border:0.33px solid rgba(255,255,255,0.12);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.mood-btns button:active{transform:scale(0.86);background:rgba(255,255,255,0.16)}

/* ── ENERGY CHART ── */
.energy-wrap{padding:12px 16px 16px}
.energy-legend{display:flex;gap:14px;margin-bottom:12px}
.e-leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);font-weight:400}
.e-dot{width:7px;height:7px;border-radius:50%}
.chart-area{height:100px;position:relative;margin-bottom:8px}
.chart-area svg{width:100%;height:100%}
.chart-days{display:flex;justify-content:space-between}
.chart-day{font-size:10px;color:var(--text3);font-weight:400}
.energy-insight{background:rgba(255,255,255,0.06);border:0.33px solid rgba(255,255,255,0.10);border-radius:var(--r);padding:12px 14px;margin-top:12px;font-size:14px;color:var(--text2);line-height:1.6}

/* ── DIARY ── */
.diary-ta{width:100%;background:rgba(28,28,30,0.70);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:0.33px solid rgba(255,255,255,0.12);border-radius:var(--r-lg);padding:14px 16px;color:var(--text);font-size:16px;font-family:-apple-system,'Inter',sans-serif;resize:none;outline:none;margin-bottom:10px;-webkit-appearance:none;line-height:1.6;transition:background 0.15s;background-image:linear-gradient(to bottom,rgba(255,255,255,0.06) 0px,transparent 1px)}
.diary-ta:focus{background:rgba(44,44,46,0.80)}
.diary-ta::placeholder{color:var(--text3)}
.diary-label{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:7px;padding-left:2px}

/* ── MONTH ── */
.month-cat{background:rgba(28,28,30,0.70);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:0.33px solid rgba(255,255,255,0.12);border-radius:var(--r-xl);overflow:hidden;margin-bottom:10px;background-image:linear-gradient(to bottom,rgba(255,255,255,0.06) 0px,transparent 1px)}
.month-cat-head{padding:13px 16px 11px;border-bottom:0.33px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.month-cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.month-cat-name{font-size:14px;font-weight:500;flex:1}
.month-cat-count{font-size:12px;color:var(--text3)}
.month-task-row{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:0.33px solid rgba(255,255,255,0.08)}
.month-task-row:last-child{border-bottom:none}
.m-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.18);flex-shrink:0;cursor:pointer;transition:all 0.2s}
.m-dot.done{background:var(--green)}
.m-inp{flex:1;background:none;border:none;color:var(--text);font-size:15px;font-family:-apple-system,'Inter',sans-serif;outline:none}
.m-inp::placeholder{color:var(--text3)}
.m-inp.done{text-decoration:line-through;color:var(--text3)}

/* ── STORAGE ── */
.storage-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.33px solid rgba(255,255,255,0.08)}
.storage-item:last-child{border-bottom:none}
.s-check{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.22);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all 0.22s cubic-bezier(.34,1.56,.64,1)}
.s-check.done{background:var(--green);border-color:var(--green);color:#000}
.s-inp{flex:1;background:none;border:none;color:var(--text);font-size:15px;font-family:-apple-system,'Inter',sans-serif;outline:none}
.s-inp.done{text-decoration:line-through;color:var(--text3)}

/* ── XP SCREEN ── */
.xp-hero{background:rgba(28,28,30,0.70);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.14);border-radius:var(--r-xl);padding:32px 20px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden;background-image:linear-gradient(to bottom,rgba(255,255,255,0.08) 0px,transparent 1px)}
.xp-hero::before{content:'';position:absolute;top:-60%;left:-20%;width:140%;height:200%;background:radial-gradient(ellipse at 50% 0%,rgba(110,91,255,0.15),transparent 55%);pointer-events:none}
.xp-hero-num{font-size:88px;font-weight:700;line-height:1;color:var(--text);position:relative;z-index:1;letter-spacing:-4px;font-variant-numeric:tabular-nums}
.xp-hero-title{font-size:18px;font-weight:500;color:var(--text2);margin-top:4px;margin-bottom:16px;position:relative;z-index:1}
.xp-hero-sub{font-size:13px;color:var(--text3);margin-bottom:12px;position:relative;z-index:1}
.xp-hero-track{height:6px;background:rgba(255,255,255,0.10);border-radius:100px;margin-bottom:8px;overflow:hidden;position:relative;z-index:1}
.xp-hero-prog{height:100%;background:var(--amber);border-radius:100px;transition:width 0.9s cubic-bezier(.4,0,.2,1)}
.xp-hero-pts{font-size:12px;color:var(--text3);position:relative;z-index:1}
.achiev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.achiev{background:rgba(28,28,30,0.65);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:0.33px solid rgba(255,255,255,0.10);border-radius:14px;padding:12px 6px;text-align:center;transition:all 0.22s;opacity:0.35}
.achiev:active{transform:scale(0.94)}
.achiev.done{opacity:1;border-color:rgba(255,214,10,0.28);background:rgba(255,214,10,0.10)}
.achiev-ic{font-size:24px;margin-bottom:4px}
.achiev-nm{font-size:9px;color:var(--text2);font-weight:500;line-height:1.3}
.xp-log{background:rgba(28,28,30,0.70);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.12);border-radius:var(--r-xl);overflow:hidden;background-image:linear-gradient(to bottom,rgba(255,255,255,0.06) 0px,transparent 1px)}
.xp-log-item{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:0.33px solid rgba(255,255,255,0.08)}
.xp-log-item:last-child{border-bottom:none}
.xp-log-text{font-size:15px;color:var(--text);font-weight:400}
.xp-log-date{font-size:12px;color:var(--text3);margin-top:2px}
.xp-log-pts{font-size:15px;font-weight:600;color:var(--amber)}

/* ── COACH SCREEN ── */
.coach-hero{background:rgba(28,28,30,0.70);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.12);border-radius:var(--r-xl);padding:20px;margin-bottom:12px;background-image:linear-gradient(to bottom,rgba(255,255,255,0.06) 0px,transparent 1px)}
.coach-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.coach-ava{width:44px;height:44px;border-radius:14px;background:rgba(110,91,255,0.25);border:0.33px solid rgba(110,91,255,0.3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.coach-info-name{font-weight:600;font-size:15px;color:var(--text)}
.coach-info-sub{font-size:12px;color:var(--text3);margin-top:2px}
.coach-text{font-size:15px;line-height:1.7;color:var(--text2);white-space:pre-wrap}
.coach-text.loading{color:var(--text3);font-style:italic}
.coach-action{margin-top:14px;background:rgba(110,91,255,0.12);border:0.33px solid rgba(110,91,255,0.2);border-radius:var(--r-lg);padding:11px 16px;color:var(--accent);font-size:14px;font-family:-apple-system,'Inter',sans-serif;cursor:pointer;width:100%;text-align:left;transition:opacity 0.15s}
.coach-action:active{opacity:0.7}
.energy-rating{background:rgba(28,28,30,0.70);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.12);border-radius:var(--r-xl);padding:16px;margin-bottom:12px;background-image:linear-gradient(to bottom,rgba(255,255,255,0.06) 0px,transparent 1px)}
.er-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px;color:var(--text2)}
.er-val{font-weight:500;color:var(--text)}
.er-track{height:3px;background:rgba(255,255,255,0.08);border-radius:100px;margin-bottom:12px;overflow:hidden}
.er-fill{height:100%;background:var(--accent);border-radius:100px;transition:width 0.6s}
.backup-row{display:flex;gap:10px;margin-bottom:12px}
.backup-btn{flex:1;background:rgba(255,255,255,0.08);border:0.33px solid rgba(255,255,255,0.12);border-radius:var(--r-lg);padding:13px;font-size:14px;font-family:-apple-system,'Inter',sans-serif;cursor:pointer;color:var(--text2);text-align:center;transition:opacity 0.15s}
.backup-btn.green{color:var(--green)}
.backup-btn:active{opacity:0.6}

/* ── FOCUS TIMER MODAL ── */
.focus-modal{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;padding-bottom:0}
.focus-modal-bg{position:absolute;inset:0;background:rgba(0,0,0,0.80);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.focus-modal-sheet{position:relative;z-index:1;width:100%;background:rgba(28,28,30,0.88);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.16);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:30px 24px calc(36px + var(--safe-bot));animation:slideUp 0.38s cubic-bezier(.4,0,.2,1);background-image:linear-gradient(to bottom,rgba(255,255,255,0.08) 0px,transparent 1px)}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.focus-task-name{font-size:14px;color:var(--text2);margin-bottom:8px;text-align:center;font-weight:400}
.focus-timer{font-size:80px;font-weight:700;text-align:center;margin:16px 0;color:var(--text);letter-spacing:-3px;font-variant-numeric:tabular-nums}
.focus-progress{height:4px;background:rgba(255,255,255,0.10);border-radius:100px;margin-bottom:24px;overflow:hidden}
.focus-prog-fill{height:100%;background:var(--accent);border-radius:100px;transition:width 1s linear}
.focus-btns{display:flex;gap:10px}
.focus-btn-big{flex:1;padding:15px;border-radius:var(--r-lg);font-size:16px;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;color:#fff}
.focus-btn-big.primary{background:var(--accent)}
.focus-btn-big.danger{background:rgba(255,255,255,0.10);border:0.33px solid rgba(255,255,255,0.14);color:var(--text2)}
.focus-btn-big:active{transform:scale(0.96);opacity:0.85}

/* ── INPUT MODAL ── */
.modal{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.modal-sheet{position:relative;z-index:1;width:100%;background:rgba(28,28,30,0.88);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.16);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:22px 20px;padding-bottom:calc(18px + var(--safe-bot));animation:slideUp 0.32s cubic-bezier(.4,0,.2,1);background-image:linear-gradient(to bottom,rgba(255,255,255,0.08) 0px,transparent 1px)}
.modal-input{width:100%;background:rgba(255,255,255,0.08);border:0.33px solid rgba(255,255,255,0.16);border-radius:var(--r-lg);padding:14px 16px;color:var(--text);font-size:16px;font-family:-apple-system,'Inter',sans-serif;outline:none;margin-bottom:12px;transition:background 0.15s;-webkit-appearance:none}
.modal-input:focus{background:rgba(255,255,255,0.12)}
.modal-btn{width:100%;background:var(--accent);border:none;border-radius:var(--r-lg);padding:15px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.modal-btn:active{opacity:0.8}

/* ── CTX MENU — iOS action sheet style ── */
.ctx-menu{position:fixed;z-index:200;background:rgba(28,28,30,0.88);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.16);border-radius:var(--r-lg);padding:6px;min-width:200px;animation:fadeScale 0.2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 20px 60px rgba(0,0,0,0.7);background-image:linear-gradient(to bottom,rgba(255,255,255,0.08) 0px,transparent 1px)}
@keyframes fadeScale{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
.ctx-item{padding:12px 16px;border-radius:10px;font-size:15px;cursor:pointer;color:var(--text);transition:background 0.12s;display:flex;align-items:center;gap:10px;font-weight:400;border-bottom:0.33px solid rgba(255,255,255,0.08)}
.ctx-item:last-child{border-bottom:none}
.ctx-item:active{background:rgba(255,255,255,0.08)}
.ctx-item.red{color:var(--red)}

/* ── TOAST — iOS notification style ── */
.toast{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bot) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(44,44,46,0.92);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.14);border-radius:100px;padding:10px 20px;font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;opacity:0;transition:all 0.3s cubic-bezier(.34,1.56,.64,1);z-index:300;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── XP POPUP ── */
.xp-popup{position:fixed;top:calc(58px + var(--safe-top) + 12px);left:50%;transform:translateX(-50%) translateY(-10px) scale(0.94);background:rgba(44,44,46,0.92);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.14);border-radius:100px;padding:8px 18px;font-size:14px;font-weight:600;color:var(--amber);white-space:nowrap;opacity:0;transition:all 0.32s cubic-bezier(.34,1.56,.64,1);z-index:200;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,0.4)}
.xp-popup.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}

/* ── LEVEL UP MODAL — iOS alert style ── */
.lvlup{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.78);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.lvlup-card{background:rgba(44,44,46,0.92);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.18);border-radius:var(--r-xl);padding:36px 24px;text-align:center;animation:lvlupIn 0.4s cubic-bezier(.34,1.56,.64,1);max-width:300px;width:88%;box-shadow:0 24px 60px rgba(0,0,0,0.7);background-image:linear-gradient(to bottom,rgba(255,255,255,0.08) 0px,transparent 1px)}
@keyframes lvlupIn{from{opacity:0;transform:scale(0.82)}to{opacity:1;transform:scale(1)}}
.lvlup-emoji{font-size:56px;margin-bottom:10px}
.lvlup-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px}
.lvlup-sub{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.5}
.lvlup-btn{background:var(--accent);border:none;border-radius:var(--r-lg);padding:14px 32px;font-size:16px;font-weight:600;color:#fff;cursor:pointer;transition:opacity 0.15s;width:100%}
.lvlup-btn:active{opacity:0.8}

/* ── FAB — iOS style ── */
#fab{position:fixed;right:20px;bottom:calc(var(--tab-h) + var(--safe-bot) + 18px);z-index:50;width:52px;height:52px;border-radius:16px;background:var(--accent);border:none;color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(110,91,255,0.4);transition:all 0.22s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent}
#fab:active{transform:scale(0.88);opacity:0.85}

/* ── CONFETTI ── */
.confetti-piece{position:fixed;top:-10px;width:8px;height:8px;border-radius:2px;z-index:500;pointer-events:none;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── LOGIN SCREEN — iOS sheet ── */
#loginScreen{position:fixed;inset:0;z-index:100;background:#000;display:flex;align-items:flex-end;justify-content:center;padding:0}
.login-bg{position:absolute;inset:0;overflow:hidden}
.login-orb1{position:absolute;width:380px;height:380px;background:radial-gradient(circle,rgba(110,91,255,0.22),transparent 70%);top:-100px;left:-80px;border-radius:50%;animation:orbFloat1 20s linear infinite}
.login-orb2{position:absolute;width:280px;height:280px;background:radial-gradient(circle,rgba(191,90,242,0.16),transparent 70%);bottom:25%;right:-60px;border-radius:50%;animation:orbFloat2 28s linear infinite}
.login-sheet{position:relative;z-index:1;width:100%;background:rgba(28,28,30,0.88);backdrop-filter:blur(50px) saturate(200%);-webkit-backdrop-filter:blur(50px) saturate(200%);border:0.33px solid rgba(255,255,255,0.16);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:32px 24px calc(44px + var(--safe-bot));animation:slideUp 0.48s cubic-bezier(.4,0,.2,1);background-image:linear-gradient(to bottom,rgba(255,255,255,0.10) 0px,transparent 1px)}
.login-logo{font-size:30px;font-weight:700;letter-spacing:1px;text-align:center;margin-bottom:5px;color:var(--text)}
.login-logo span{color:var(--accent);-webkit-text-fill-color:var(--accent)}
.login-tagline{font-size:14px;color:var(--text3);text-align:center;margin-bottom:28px;font-weight:400}
.login-label{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:7px;padding-left:2px}
.login-input{width:100%;background:rgba(255,255,255,0.08);border:0.33px solid rgba(255,255,255,0.16);border-radius:var(--r-lg);padding:14px 16px;color:var(--text);font-size:16px;font-family:-apple-system,'Inter',sans-serif;outline:none;margin-bottom:14px;transition:background 0.15s;-webkit-appearance:none}
.login-input:focus{background:rgba(255,255,255,0.12)}
.login-btn{width:100%;background:var(--accent);border:none;border-radius:var(--r-lg);padding:15px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:opacity 0.15s;margin-bottom:14px}
.login-btn:active{opacity:0.8}
.login-err{font-size:13px;color:var(--red);text-align:center;min-height:18px;margin-bottom:8px;font-weight:400}
.login-tg{display:flex;align-items:center;justify-content:center;gap:6px;font-size:14px;color:var(--text3)}
.login-tg a{color:var(--accent);text-decoration:none;font-weight:500}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:2000;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;transition:opacity 0.5s ease}
.splash-logo{font-size:28px;font-weight:700;letter-spacing:1px;position:relative;z-index:1;color:#fff}
.splash-logo span{color:var(--accent);-webkit-text-fill-color:var(--accent)}
.splash-dot{display:flex;gap:6px;margin-top:16px;position:relative;z-index:1}
.splash-dot span{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.35);animation:dotBounce 1.4s ease-in-out infinite}
.splash-dot span:nth-child(2){animation-delay:0.18s}
.splash-dot span:nth-child(3){animation-delay:0.36s}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0);opacity:0.3}40%{transform:translateY(-5px);opacity:1}}

/* ── SEC LABEL — iOS section header ── */
.sec-label{font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;padding-left:4px}

/* ── WEEK SUMMARY CARD ── */
.week-summary{background:rgba(28,28,30,0.70);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.12);border-radius:var(--r-xl);padding:16px;margin-bottom:12px;background-image:linear-gradient(to bottom,rgba(255,255,255,0.06) 0px,transparent 1px)}
.week-summary-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px}
.week-summary-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;font-size:14px}
.week-summary-row:last-child{margin-bottom:0}
.ws-label{color:var(--text2)}
.ws-val{font-weight:500;color:var(--text)}
.ws-val.good{color:var(--green)}
.ws-val.warn{color:var(--amber)}

/* ── API KEY BLOCK ── */
.apikey-block{background:rgba(28,28,30,0.70);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:0.33px solid rgba(255,255,255,0.12);border-radius:var(--r-xl);padding:16px;margin-bottom:12px;background-image:linear-gradient(to bottom,rgba(255,255,255,0.06) 0px,transparent 1px)}
.apikey-label{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:8px}
.apikey-row{display:flex;gap:8px}
.apikey-input{flex:1;background:rgba(255,255,255,0.08);border:0.33px solid rgba(255,255,255,0.14);border-radius:var(--r);padding:10px 13px;color:var(--text);font-size:14px;font-family:-apple-system,'Inter',sans-serif;outline:none;-webkit-appearance:none}
.apikey-input:focus{background:rgba(255,255,255,0.12)}
.apikey-save{background:var(--accent);border:none;border-radius:var(--r);padding:10px 16px;color:#fff;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity 0.15s}
.apikey-save:active{opacity:0.8}
.apikey-hint{font-size:12px;color:var(--text3);margin-top:7px;line-height:1.5}
.apikey-hint a{color:var(--accent);text-decoration:none}

/* ── CALENDAR BUTTON ── */
.cal-btn{background:none;border:none;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:opacity 0.15s;flex-shrink:0}
.cal-btn:active{opacity:0.5}
.cal-btn.open{opacity:0.7}

/* ── CALENDAR PANEL — iOS popover ── */
.cal-panel{position:fixed;top:calc(var(--safe-top) + 60px);right:12px;width:316px;background:rgba(44,44,46,0.92);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.33px solid rgba(255,255,255,0.18);border-radius:var(--r-xl);z-index:500;overflow:hidden;transform-origin:top right;transition:transform 0.28s cubic-bezier(.34,1.56,.64,1),opacity 0.2s ease;box-shadow:0 20px 60px rgba(0,0,0,0.6);background-image:linear-gradient(to bottom,rgba(255,255,255,0.08) 0px,transparent 1px)}
.cal-panel.hidden{transform:scale(0.88) translateY(-6px);opacity:0;pointer-events:none}
.cal-panel.visible{transform:scale(1) translateY(0);opacity:1}

/* ── CALENDAR HEADER ── */
.cal-header{display:flex;align-items:center;padding:14px 14px 10px;gap:4px}
.cal-nav{background:rgba(255,255,255,0.10);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--text2);flex-shrink:0;transition:all 0.15s}
.cal-nav:active{opacity:0.6}
.cal-nav:disabled{opacity:0.2;cursor:default}
.cal-title{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer}
.cal-month-name{font-size:15px;font-weight:600;color:var(--text);line-height:1}
.cal-year-name{font-size:11px;font-weight:400;color:var(--text3)}
.cal-title:active .cal-month-name,.cal-title:active .cal-year-name{opacity:0.6}

/* ── DAY NAMES ROW ── */
.cal-daynames{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px 4px;gap:2px}
.cal-dn{text-align:center;font-size:10px;font-weight:500;color:var(--text3);padding:3px 0}
.cal-dn.weekend{color:rgba(255,69,58,0.6)}

/* ── DAYS GRID ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px 12px;gap:3px}
.cal-cell{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:400;cursor:pointer;color:var(--text2);transition:all 0.15s;position:relative}
.cal-cell:active{opacity:0.6;transform:scale(0.88)}
.cal-cell.other-month{color:var(--text3);opacity:0.35}
.cal-cell.today{color:var(--accent);font-weight:600}
.cal-cell.today::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-cell.in-sel-week{background:rgba(110,91,255,0.14);color:var(--text)}
.cal-cell.sel-day{background:var(--accent);color:#fff;font-weight:600}
.cal-cell.sel-day::after{display:none}
.cal-cell.future{opacity:0.2;cursor:default;pointer-events:none}

/* ── YEAR PICKER ── */
.year-picker{padding:8px 10px 14px;border-top:0.33px solid rgba(255,255,255,0.08)}
.year-picker-title{font-size:11px;font-weight:500;color:var(--text3);text-align:center;margin-bottom:10px}
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.year-cell{padding:9px 4px;border-radius:100px;text-align:center;font-size:13px;font-weight:400;color:var(--text2);cursor:pointer;transition:all 0.15s}
.year-cell:active{opacity:0.6}
.year-cell.cur-year{color:var(--accent);font-weight:600}
.year-cell.sel-year{background:var(--accent);color:#fff;font-weight:600}
.year-cell.future-year{opacity:0.2;cursor:default;pointer-events:none}

/* ── MONTH PICKER ── */
.month-picker{padding:8px 10px 14px;border-top:0.33px solid rgba(255,255,255,0.08)}
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.month-cell{padding:10px 4px;border-radius:100px;text-align:center;font-size:13px;font-weight:400;color:var(--text2);cursor:pointer;transition:all 0.15s}
.month-cell:active{opacity:0.6}
.month-cell.cur-month{color:var(--accent);font-weight:600}
.month-cell.sel-month{background:var(--accent);color:#fff;font-weight:600}
.month-cell.future-month{opacity:0.2;cursor:default;pointer-events:none}

/* ── SYNC DOT ── */
.sync-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background 0.4s;flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:pulse 1.2s ease-in-out infinite}
.sync-dot.synced{background:var(--green)}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* ── FIREBASE SETUP ── */
.fb-setup{background:rgba(28,28,30,0.70);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:0.33px solid rgba(255,255,255,0.12);border-radius:var(--r-xl);padding:16px;margin-bottom:12px;background-image:linear-gradient(to bottom,rgba(255,255,255,0.06) 0px,transparent 1px)}
.fb-setup-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:7px}
.fb-setup-desc{font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:12px}
.fb-setup-desc a{color:var(--accent);text-decoration:none}
.fb-inp{width:100%;background:rgba(255,255,255,0.08);border:0.33px solid rgba(255,255,255,0.14);border-radius:var(--r);padding:10px 13px;color:var(--text);font-size:14px;font-family:-apple-system,'Inter',sans-serif;outline:none;margin-bottom:8px;-webkit-appearance:none}
.fb-inp:focus{background:rgba(255,255,255,0.12)}
.fb-btn{width:100%;background:var(--accent);border:none;border-radius:var(--r);padding:11px;color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:opacity 0.15s}
.fb-btn:active{opacity:0.8}
.fb-status{font-size:12px;margin-top:8px;text-align:center;min-height:16px;color:var(--text3)}
.fb-status.ok{color:var(--green)}
.fb-status.err{color:var(--red)}
/* ── HIDDEN ── */
.hidden{display:none!important}

/* ── LIGHT THEME ── */

  --bg:      #F2F2F7;
  --bg2:     #FFFFFF;
  --bg3:     #F2F2F7;

<script>
// ── CONSTANTS ──
const DAYS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const LVL_NAMES=['Новичок','Ученик','Практик','Знаток','Мастер','Эксперт','Профи','Элита','Легенда','Бог продуктивности'];
const ACHIEV=[
  {id:'first_task',ic:'✅',n:'Первый шаг'},
  {id:'week_50',ic:'🎯',n:'50% недели'},
  {id:'week_100',ic:'🏆',n:'Идеальная неделя'},
  {id:'habit_7',ic:'🔥',n:'Неделя привычки'},
  {id:'habit_21',ic:'💎',n:'21 день'},
  {id:'xp_100',ic:'⚡',n:'100 XP'},
  {id:'xp_500',ic:'🚀',n:'500 XP'},
  {id:'level_3',ic:'🌟',n:'Уровень 3'},
  {id:'level_5',ic:'👑',n:'Уровень 5'},
  {id:'diary_7',ic:'📓',n:'Дневник недели'},
  {id:'goals_5',ic:'🎪',n:'5 целей'},
  {id:'storage_10',ic:'💡',n:'10 идей'}
];

// ── STATE ──
let page='week', wOff=0, selDay=0, em=false;
let focusInterval=null, focusTotal=25*60, focusLeft=focusTotal, focusRunning=false;

// ── LOCAL STORAGE ──
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const svLocal=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

// ── FIREBASE SYNC ──
let fbDb=null, fbUid=null, fbReady=false, syncQ=new Set();

function setSyncDot(state){
  const d=document.getElementById('syncDot');
  if(!d)return;
  d.className='sync-dot'+(state?' '+state:'');
}

async function hashKey(key){
  try{
    const enc=new TextEncoder().encode(key);
    const buf=await crypto.subtle.digest('SHA-256',enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,40);
  }catch{return btoa(key).replace(/[^a-z0-9]/gi,'').slice(0,40);}
}

function fbPath(k){return 'u/'+fbUid+'/'+k.replace(/[.#$\[\]/]/g,'_');}

async function initFirebase(activationKey){
  const cfg=ld('fb_cfg',null);
  if(!cfg||!cfg.databaseURL)return;
  try{
    if(!firebase.apps.length)firebase.initializeApp(cfg);
    fbDb=firebase.database();
    fbUid=await hashKey(activationKey);
    fbReady=true;
    setSyncDot('syncing');
    // Pull all cloud data first, then merge (cloud wins for existing keys)
    const snap=await fbDb.ref('u/'+fbUid).get();
    if(snap.exists()){
      const data=snap.val();
      Object.entries(data).forEach(([k,v])=>{
        // restore original key name (underscores back to dots for wk_ keys)
        const orig=k.replace(/^wk_minus/,'wk_-');
        svLocal(orig,v);
      });
      setSyncDot('synced');
      render();
    }else{
      // First time on this device — push local data to cloud
      pushAllToCloud();
    }
    // Real-time listener for changes from other devices
    fbDb.ref('u/'+fbUid).on('value',snap=>{
      if(!snap.exists())return;
      const data=snap.val();
      let changed=false;
      Object.entries(data).forEach(([k,v])=>{
        const orig=k.startsWith('wk_minus')?k.replace('wk_minus','wk_-'):k;
        const cur=localStorage.getItem(orig);
        const newStr=JSON.stringify(v);
        if(cur!==newStr){svLocal(orig,v);changed=true;}
      });
      if(changed)render();
      setSyncDot('synced');
    });
  }catch(e){fbReady=false;setSyncDot('error');console.warn('Firebase:',e);}
}

function pushAllToCloud(){
  if(!fbDb||!fbUid)return;
  const keys=['hb2','st','xp','achievements','claude_key'];
  for(let i=-52;i<=52;i++){keys.push('wk_'+i);}
  const updates={};
  keys.forEach(k=>{
    const v=localStorage.getItem(k);
    if(v)try{updates[fbPath(k)]=JSON.parse(v);}catch{}
  });
  fbDb.ref().update(updates).then(()=>setSyncDot('synced')).catch(()=>setSyncDot('error'));
}

const sv=(k,v)=>{
  svLocal(k,v);
  if(fbReady&&fbDb&&fbUid){
    setSyncDot('syncing');
    fbDb.ref(fbPath(k)).set(v)
      .then(()=>setSyncDot('synced'))
      .catch(()=>setSyncDot('error'));
  }
};

// ── WEEK DATA ──
function mkWeek(){return{goals:['','','','',''],goalsD:[false,false,false,false,false],tasks:[[],[],[],[],[],[],[]],tasksD:[[],[],[],[],[],[],[]],mood:Array(7).fill(null)};}
function wk(off){return ld('wk_'+off,mkWeek());}
function swk(off,w){sv('wk_'+off,w);}
function wDates(off){const d=new Date();d.setDate(d.getDate()-(d.getDay()||7)+1+off*7);return Array(7).fill(0).map((_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x;});}
function fmt(d){return d.getDate()+'.'+(d.getMonth()+1);}
function isToday(d){const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear();}
// key for habit storage — includes year to prevent cross-year collision
function fmtKey(d){return d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear();}

// ── HABITS ──
function hb(){return ld('hb2',{list:['Спорт','Чтение','Медитация'],days:{}});}
function shb(h){sv('hb2',h);}

// ── STORAGE ──
function st(){return ld('st',[]);}
function sst(s){sv('st',s);}

// ── XP ──
function xpNeeded(lv){return 100+lv*50;}
function xpd(){return ld('xp',{total:0,level:1,hist:[]});}
function addXP(pts,reason){
  const x=xpd(), prevLv=x.level;
  x.total+=pts;
  const need=xpNeeded(x.level);
  if(x.total>=need){x.total-=need;x.level++;}
  x.hist.unshift({p:pts,r:reason,d:new Date().toLocaleDateString('ru')});
  if(x.hist.length>50)x.hist.pop();
  sv('xp',x);
  showXpPop('+'+pts+' XP');
  if(x.level>prevLv)showLevelUp(x.level);
  checkAchievements();
  updXP();
}
function updXP(){
  const x=xpd(),need=xpNeeded(x.level),pct=Math.min(100,Math.round(x.total/need*100));
  const lv=document.getElementById('xpLv'),bar=document.getElementById('xpBar');
  if(lv)lv.textContent=x.level;
  if(bar)bar.style.width=pct+'%';
}

// ── ACHIEVEMENTS ──
function checkAchievements(){
  const done=ld('achievements',[]);
  const unlock=(id)=>{if(!done.includes(id)){done.push(id);sv('achievements',done);showToast('🏆 Достижение: '+ACHIEV.find(a=>a.id===id)?.n);}};
  const x=xpd();
  if(x.hist.length>=1)unlock('first_task');
  if(x.hist.reduce((s,i)=>s+i.p,0)>=100)unlock('xp_100');
  if(x.hist.reduce((s,i)=>s+i.p,0)>=500)unlock('xp_500');
  if(x.level>=3)unlock('level_3');
  if(x.level>=5)unlock('level_5');
  const s2=calcStats(wOff);
  if(s2.pct>=50)unlock('week_50');
  if(s2.pct>=100)unlock('week_100');
  const s3=st();
  if(s3.length>=10)unlock('storage_10');
}

// ── STATS ──
function calcStats(off){
  const w=wk(off);
  let tot=0,don=0,gt=0,gd=0;
  for(let di=0;di<7;di++){const ts=w.tasks[di]||[];ts.forEach((t,ti)=>{if(t){tot++;if(w.tasksD[di][ti])don++;}});}
  w.goals.forEach((g,i)=>{if(g){gt++;if(w.goalsD[i])gd++;}});
  return{tot,don,pct:tot>0?Math.round(don/tot*100):0,gt,gd};
}

// ── ENERGY INDEX ──
function getEI(){
  const w=wk(wOff);
  const vals=w.mood.map(x=>x||{sleep:7,energy:7,mood:7});
  const avg=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length*10)/10:7;
  const sl=avg(vals.map(v=>v.sleep));
  const en=avg(vals.map(v=>v.energy));
  const mo=avg(vals.map(v=>v.mood));
  let ins='';
  if(en>=8&&sl>=8)ins='🌟 Отличная неделя по энергии! Ты в потоке.';
  else if(sl<5)ins='💤 Мало сна влияет на всё. Попробуй лечь на час раньше.';
  else if(en<5)ins='⚡ Энергия ниже нормы. Сделай паузу и подвигайся.';
  else ins='✅ Показатели в норме. Поддерживай ритм.';
  return{sl,en,mo,ins};
}

// ── CTX MENU ──
let ctxData=null;
function showCtx(type,data){
  const existing=document.getElementById('ctxMenu');if(existing)existing.remove();
  const bg2=document.getElementById('ctxBg');if(bg2)bg2.remove();
  ctxData={type,...data};
  const m=document.createElement('div');m.id='ctxMenu';m.className='ctx-menu';
  m.style.cssText='bottom:calc(var(--tab-h) + var(--safe-bot) + 60px);right:18px';
  const items=[];
  if(type==='task')items.push(['⏱️ Фокус 25 мин','startFocusByIdx(ctxData.di,ctxData.ti);closeCtx()'],['🗑️ Удалить','deleteCtx()',true]);
  else items.push(['✏️ Изменить','editCtx()'],['🗑️ Удалить','deleteCtx()',true]);
  m.innerHTML=items.map(([label,fn,red])=>'<div class="ctx-item '+(red?'red':'')+'" onclick="'+fn+'">'+label+'</div>').join('');
  const bg=document.createElement('div');bg.style.cssText='position:fixed;inset:0;z-index:199';bg.onclick=closeCtx;bg.id='ctxBg';
  document.body.append(bg,m);
}
function closeCtx(){document.getElementById('ctxMenu')?.remove();document.getElementById('ctxBg')?.remove();}
function deleteCtx(){
  if(!ctxData)return;
  const{type}=ctxData;
  if(type==='task'){const w=wk(wOff);w.tasks[ctxData.di].splice(ctxData.ti,1);w.tasksD[ctxData.di].splice(ctxData.ti,1);swk(wOff,w);}
  else if(type==='goal'){const w=wk(wOff);w.goals.splice(ctxData.ci,1);w.goalsD.splice(ctxData.ci,1);swk(wOff,w);}
  else if(type==='habit'){const h=hb();h.list.splice(ctxData.hi,1);shb(h);}
  else if(type==='stor'){const s=st();s.splice(ctxData.si,1);sst(s);}
  closeCtx();render();showToast('Удалено');
}
function editCtx(){
  if(!ctxData)return;
  const old=ctxData.text||'';
  const inp=prompt('Изменить:',old);
  if(inp===null||inp===old)return;
  const{type}=ctxData;
  if(type==='goal'){const w=wk(wOff);w.goals[ctxData.ci]=inp;swk(wOff,w);}
  else if(type==='habit'){const h=hb();h.list[ctxData.hi]=inp;shb(h);}
  else if(type==='stor'){const s=st();s[ctxData.si].text=inp;sst(s);}
  closeCtx();render();
}

// ── FOCUS TIMER ──
function startFocus(taskName){
  focusLeft=focusTotal=25*60;focusRunning=false;
  clearInterval(focusInterval);
  const mod=document.createElement('div');mod.className='focus-modal';mod.id='focusModal';
  mod.innerHTML='<div class="focus-modal-bg" onclick="stopFocus()"></div><div class="focus-modal-sheet"><div class="focus-task-name">'+taskName+'</div><div class="focus-timer" id="focusClock">25:00</div><div class="focus-progress"><div class="focus-prog-fill" id="focusProg" style="width:100%"></div></div><div class="focus-btns"><button class="focus-btn-big primary" id="focusToggle" onclick="toggleFocus()">&#9654; Старт</button><button class="focus-btn-big danger" onclick="stopFocus()">Отмена</button></div></div>';
  document.body.appendChild(mod);
}
function toggleFocus(){
  focusRunning=!focusRunning;
  const btn=document.getElementById('focusToggle');
  if(btn)btn.textContent=focusRunning?'⏸ Пауза':'▶ Продолжить';
  if(focusRunning){
    focusInterval=setInterval(()=>{
      if(!focusRunning)return;
      focusLeft--;
      const m=String(Math.floor(focusLeft/60)).padStart(2,'0');
      const s=String(focusLeft%60).padStart(2,'0');
      const cl=document.getElementById('focusClock');
      const pg=document.getElementById('focusProg');
      if(cl)cl.textContent=m+':'+s;
      if(pg)pg.style.width=(focusLeft/focusTotal*100)+'%';
      if(focusLeft<=0){clearInterval(focusInterval);stopFocus();addXP(50,'Фокус 25 мин');showToast('🎯 Фокус завершён! +50 XP');try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch{}}
    },1000);
  }else{clearInterval(focusInterval);}
}
function stopFocus(){clearInterval(focusInterval);focusRunning=false;document.getElementById('focusModal')?.remove();}

// ── BACKUP ──
function exportData(){
  const keys=['hb2','st','xp','achievements'];
  const data={v:2,date:new Date().toISOString(),weeks:{}};
  for(let i=-52;i<=52;i++){const k='wk_'+i,v=localStorage.getItem(k);if(v)data.weeks[k]=JSON.parse(v);}
  keys.forEach(k=>{const v=localStorage.getItem(k);if(v)data[k]=JSON.parse(v);});
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='onelife_backup.json';a.click();
  URL.revokeObjectURL(url);showToast('✅ Сохранено');
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.weeks)Object.entries(d.weeks).forEach(([k,v])=>sv(k,v));
        ['hb2','st','xp','achievements'].forEach(k=>{if(d[k])sv(k,d[k]);});
        showToast('✅ Восстановлено');setTimeout(()=>render(),400);
      }catch{alert('Ошибка файла');}
    };r.readAsText(f);
  };inp.click();
}

  else tips.push('📈 '+s.pct+'% — начни с малого. Поставь 2-3 задачи на день и выполни их полностью.');
  if(ei.sl<=5)tips.push('💤 Недосып — главный враг продуктивности. Ляг спать на 1 час раньше — и результаты вырастут.');
  else if(ei.en<=5)tips.push('⚡ Низкая энергия. Попробуй 10-минутную прогулку перед работой — это работает лучше кофе.');
  else tips.push('✅ Энергия в норме. Используй утренние часы для самых важных задач — тогда ты на пике.');
  tips.push('🎯 На следующую неделю: выбери 1 главный приоритет и не отступай от него, что бы ни случилось.');
  return tips.join('\n\n');
}

function checkAccess(){
  const saved=ld('ol_access',null);
  if(saved&&saved.exp>Date.now()&&saved.u&&saved.k)return validateKey(saved.u,saved.k);
  return false;
}
function validateKey(username,key){
  if(!key||!key.startsWith('OL-'))return false;
  const parts=key.split('-');
  if(parts.length!==3)return false;
  if(parts[1].length!==6||parts[2].length!==8)return false;
  return /^[A-Z0-9]+$/.test(parts[1])&&/^[A-Z0-9]+$/.test(parts[2])&&username.length>=2;
}

  if(!validateKey(u,c)){err.textContent='Неверный формат. Пример: OL-ABC123-DEF45678';return;}
  svLocal('ol_access',{u,k:c,exp:Date.now()+365*24*60*60*1000});
  document.getElementById('loginScreen').style.display='none';

}

const MONTHS_RU=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_SHORT=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

let calOpen=false, calPickerMode=null; // null | 'year' | 'month'
const _now=new Date();
let calYear=_now.getFullYear(), calMonth=_now.getMonth(); // 0-indexed

function toggleCal(){calOpen?closeCal():openCal();}

function openCal(){
  calOpen=true;
  // sync calendar view to currently selected week
  const dates=wDates(wOff);
  const mid=dates[selDay]||dates[0];

  document.getElementById('calBtn').classList.add('open');

  document.getElementById('calPicker').className='hidden';

}

function closeCal(){
  calOpen=false;
  document.getElementById('calPanel').className='cal-panel hidden';
  document.getElementById('calBg').style.display='none';
  document.getElementById('calBtn').classList.remove('open');
  calPickerMode=null;
}

function calShiftMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  calPickerMode=null;
  document.getElementById('calPicker').className='hidden';
  renderCalGrid();
}

function toggleCalPicker(){
  if(calPickerMode==='year'){calPickerMode='month';renderCalPicker();}
  else if(calPickerMode==='month'){calPickerMode=null;document.getElementById('calPicker').className='hidden';}
  else{calPickerMode='year';renderCalPicker();}
}

function renderCalPicker(){
  const el=document.getElementById('calPicker');
  el.className='';
  if(calPickerMode==='year'){
    const curY=_now.getFullYear();
    const years=[];for(let y=curY+3;y>=curY-12;y--)years.push(y);
    el.innerHTML='<div class="year-picker"><div class="year-picker-title">Выбери год</div><div class="year-grid">'+
      years.map(y=>'<div class="year-cell'+(y===curY?' cur-year':'')+(y===calYear?' sel-year':'')+'" onclick="selCalYear('+y+')">'+y+'</div>').join('')+
    '</div></div>';
  }else if(calPickerMode==='month'){
    el.innerHTML='<div class="month-picker"><div class="year-picker-title">'+calYear+'</div><div class="month-grid">'+
      MONTHS_SHORT.map((m,i)=>'<div class="month-cell'+(_now.getFullYear()===calYear&&i===_now.getMonth()?' cur-month':'')+(i===calMonth?' sel-month':'')+'" onclick="selCalMonth('+i+')">'+m+'</div>').join('')+
    '</div></div>';
  }
}

function selCalYear(y){calYear=y;calPickerMode='month';renderCalPicker();}
function selCalMonth(m){calMonth=m;calPickerMode=null;document.getElementById('calPicker').className='hidden';renderCalGrid();}

function renderCalGrid(){
  const curY=_now.getFullYear(),curM=_now.getMonth(),curD=_now.getDate();
  document.getElementById('calMonthName').textContent=MONTHS_RU[calMonth];
  document.getElementById('calYearName').textContent=calYear;
  document.getElementById('calPrev').disabled=calYear<2020;

  // Get selected week's Monday and Sunday
  const selDates=wDates(wOff);
  const selMon=selDates[0],selSun=selDates[6];

  // First day of the month (0=Sun…6=Sat → convert to Mon-first: 0=Mon…6=Sun)
  const firstDay=new Date(calYear,calMonth,1);
  let startDow=firstDay.getDay();// 0=Sun
  startDow=startDow===0?6:startDow-1;// Mon=0

  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const totalCells=Math.ceil((startDow+daysInMonth)/7)*7;

  let html='';
  for(let i=0;i<totalCells;i++){
    let day,month,year,otherMonth=false;
    if(i<startDow){day=daysInPrev-startDow+i+1;month=calMonth-1;year=calYear;otherMonth=true;}
    else if(i>=startDow+daysInMonth){day=i-startDow-daysInMonth+1;month=calMonth+1;year=calYear;otherMonth=true;}
    else{day=i-startDow+1;month=calMonth;year=calYear;}
    if(month<0){month=11;year--;}
    if(month>11){month=0;year++;}

    const cellDate=new Date(year,month,day);
    cellDate.setHours(0,0,0,0);
    const today=new Date();today.setHours(0,0,0,0);

    const isToday=cellDate.getTime()===today.getTime();
    const isFuture=cellDate>today;
    const mon=new Date(cellDate);mon.setDate(cellDate.getDate()-((cellDate.getDay()||7)-1));
    const isInSelWeek=mon.getTime()===selMon.getTime()&&!otherMonth;
    const isSelDay=!otherMonth&&year===selDates[selDay].getFullYear()&&month===selDates[selDay].getMonth()&&day===selDates[selDay].getDate();

    const cls=['cal-cell',otherMonth?'other-month':'',isToday?'today':'',isInSelWeek&&!isSelDay?'in-sel-week':'',isSelDay?'sel-day':''].filter(Boolean).join(' ');
    const onclick=otherMonth?'':'onclick="calSelectDay('+year+','+(month)+','+day+')"';
    html+='<div class="'+cls+'" '+onclick+'>'+day+'</div>';
  }
  document.getElementById('calGrid').innerHTML=html;
}

function calSelectDay(year,month,day){
  const target=new Date(year,month,day);
  target.setHours(0,0,0,0);
  // Compute wOff: difference in weeks from current week's Monday
  const today=new Date();
  const curMon=new Date(today);
  curMon.setDate(today.getDate()-((today.getDay()||7)-1));
  curMon.setHours(0,0,0,0);
  const targetMon=new Date(target);
  targetMon.setDate(target.getDate()-((target.getDay()||7)-1));
  targetMon.setHours(0,0,0,0);
  const newWOff=Math.round((targetMon-curMon)/(7*24*60*60*1000));
  wOff=newWOff;
  selDay=(target.getDay()||7)-1; // 0=Mon…6=Sun
  closeCal();
  go(page);
}

// ── THEME ──
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')!=='light';
  const next=isDark?'light':'dark';
  html.setAttribute('data-theme',next);
  document.getElementById('themeBtn').textContent=next==='light'?'☀️':'🌙';
  svLocal('ol_theme',next);
}
function applyTheme(){
  const t=ld('ol_theme','dark');
  document.documentElement.setAttribute('data-theme',t);
  const btn=document.getElementById('themeBtn');
  if(btn)btn.textContent=t==='light'?'☀️':'🌙';
}
applyTheme();

window.addEventListener('load',()=>{
  const splash=document.getElementById('splash');
  setTimeout(()=>{
    splash.style.opacity='0';
    setTimeout(()=>{
      splash.style.display='none';
      if(checkAccess()){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('app').style.display='flex';
        document.getElementById('fab').style.display='flex';
        setTimeout(()=>{document.getElementById('app').classList.add('visible');},50);

        updXP();render();
      }else{
        document.getElementById('loginScreen').style.display='flex';
        document.getElementById('app').style.display='none';
        document.getElementById('fab').style.display='none';
        setTimeout(()=>document.getElementById('li_u')?.focus(),300);
      }
    },550);
  },1000);
});
