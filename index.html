<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ONE LIFE">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>ONE LIFE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@700;800&display=swap');

:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #222;
  --bg4: #2a2a2a;
  --border: rgba(255,255,255,0.09);
  --border2: rgba(255,255,255,0.16);
  --text: #f0f0f0;
  --text2: #999;
  --text3: #555;
  --accent: #7EB8FF;
  --green: #4ade80;
  --amber: #fbbf24;
  --red: #f87171;
  --purple: #a78bfa;
  --r: 12px;
  --r-lg: 16px;
  --tab-h: 80px;
  --top-h: 56px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 14px;
  overflow: hidden;
  overscroll-behavior: none;
}

/* ─── SHELL ─── */
#app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  width: 100%;
}

/* top bar */
.topbar {
  flex-shrink: 0;
  height: calc(var(--top-h) + var(--safe-top));
  padding-top: var(--safe-top);
  background: rgba(15,15,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: flex-end;
  padding-bottom: 10px;
  padding-left: 16px; padding-right: 16px;
  position: relative; z-index: 10;
}
.topbar-title {
  font-family: 'Manrope', sans-serif;
  font-size: 20px; font-weight: 800;
  letter-spacing: 2px;
  flex: 1;
}
.topbar-title span { color: var(--accent); }
.topbar-week {
  display: flex; align-items: center; gap: 10px;
}
.topbar-week button {
  background: var(--bg3); border: none;
  color: var(--text2); font-size: 18px;
  width: 30px; height: 30px;
  border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.topbar-week .wlbl {
  font-size: 12px; color: var(--text2);
  min-width: 100px; text-align: center;
}

/* scroll area */
.page-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 16px 16px calc(var(--tab-h) + var(--safe-bot) + 8px);
}

/* bottom tab bar */
.tabbar {
  flex-shrink: 0;
  height: calc(var(--tab-h) + var(--safe-bot));
  padding-bottom: var(--safe-bot);
  background: rgba(15,15,15,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
  display: flex; align-items: flex-start;
  padding-top: 8px;
  position: relative; z-index: 10;
}
.tab-btn {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  cursor: pointer;
  padding: 4px 0;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn .ticon { font-size: 22px; line-height: 1; }
.tab-btn .tlbl {
  font-size: 10px; color: var(--text3);
  transition: color 0.15s;
}
.tab-btn.active .tlbl { color: var(--accent); }
.tab-btn.active .ticon { filter: none; }
.tab-btn:not(.active) .ticon { opacity: 0.4; }

/* ─── COMPONENTS ─── */

.section { margin-bottom: 14px; }

.card {
  background: var(--bg2);
  border-radius: var(--r-lg);
  overflow: hidden;
}

.card-header {
  padding: 12px 14px 0;
  font-size: 11px; font-weight: 500;
  color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.7px;
  margin-bottom: 10px;
}

/* Stats */
.stats-row {
  display: grid; grid-template-columns: repeat(2,1fr);
  gap: 10px; margin-bottom: 14px;
}
.stat-card {
  background: var(--bg2);
  border-radius: var(--r-lg);
  padding: 14px;
}
.stat-lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.stat-val { font-family: 'Manrope', sans-serif; font-size: 28px; font-weight: 800; }
.stat-val.g { color: var(--green); }
.stat-val.a { color: var(--amber); }
.stat-val.b { color: var(--accent); }
.stat-val.p { color: var(--purple); }
.pbar { height: 3px; background: var(--bg4); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width 0.3s; }

/* Goals */
.goal-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-bottom: 0.5px solid var(--border);
}
.goal-row:last-child { border-bottom: none; }
.gcheck {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: transparent;
  transition: all 0.2s;
}
.gcheck.done { background: var(--green); border-color: var(--green); color: #000; }
.ginput {
  flex: 1; background: none; border: none;
  color: var(--text); font-size: 14px;
  font-family: 'Inter', sans-serif; outline: none;
}
.ginput::placeholder { color: var(--text3); }
.ginput.done { text-decoration: line-through; color: var(--text3); }

/* Day tabs (week view) */
.day-tabs {
  display: flex; gap: 6px;
  overflow-x: auto; padding: 0 0 4px;
  scrollbar-width: none; -ms-overflow-style: none;
  margin-bottom: 12px;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0;
  background: var(--bg2); border-radius: 10px;
  padding: 8px 12px; cursor: pointer;
  text-align: center; min-width: 48px;
  transition: all 0.15s;
}
.day-tab.active { background: var(--accent); }
.day-tab .dtname { font-size: 11px; color: var(--text2); font-weight: 500; }
.day-tab .dtdate { font-size: 10px; color: var(--text3); margin-top: 1px; }
.day-tab.active .dtname { color: #000; }
.day-tab.active .dtdate { color: rgba(0,0,0,0.6); }
.day-tab.today:not(.active) .dtname { color: var(--accent); }

/* Tasks list */
.task-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.task-row:last-child { border-bottom: none; }
.task-row:active { background: var(--bg3); }
.tcheck {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: transparent;
  transition: all 0.2s;
}
.tcheck.done { background: var(--green); border-color: var(--green); color: #000; }
.task-text { flex: 1; font-size: 14px; }
.task-text.done { text-decoration: line-through; color: var(--text3); }

.add-row {
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
}
.add-row:active { background: var(--bg3); }
.add-icon {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent); color: #000;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; flex-shrink: 0;
}
.add-row span { color: var(--accent); font-size: 14px; }

/* Week bar mini */
.week-bars {
  display: flex; gap: 4px; padding: 12px 14px;
  align-items: flex-end; height: 70px;
}
.wbar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.wbar-inner { width: 100%; flex: 1; background: var(--bg4); border-radius: 4px 4px 0 0; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
.wbar-fill { background: var(--green); border-radius: 4px 4px 0 0; transition: height 0.4s; }
.wbar-lbl { font-size: 10px; color: var(--text3); }

/* Habits */
.habit-row {
  padding: 10px 14px;
  border-bottom: 0.5px solid var(--border);
}
.habit-row:last-child { border-bottom: none; }
.habit-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.habit-name { font-size: 13px; }
.habit-pct { font-size: 12px; color: var(--text3); }
.habit-days { display: flex; gap: 6px; }
.hday {
  flex: 1; height: 32px; border-radius: 6px;
  background: var(--bg4);
  border: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
  gap: 2px;
}
.hday.done { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); }
.hday .hday-name { font-size: 9px; color: var(--text3); }
.hday .hday-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); }
.hday.done .hday-dot { background: var(--green); }

/* Mood */
.mood-row { display: flex; gap: 8px; margin-bottom: 12px; }
.mood-card {
  flex: 1; background: var(--bg2);
  border-radius: var(--r); padding: 12px 8px;
  text-align: center;
}
.mood-lbl { font-size: 10px; color: var(--text3); margin-bottom: 6px; }
.mood-val { font-family: 'Manrope', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 8px; }
.mood-btns { display: flex; gap: 6px; justify-content: center; }
.mood-btns button {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg4); border: 1px solid var(--border);
  color: var(--text2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.mood-btns button:active { background: var(--bg3); }

/* Textarea */
.diary-ta {
  width: 100%; background: var(--bg2);
  border: none; border-radius: var(--r);
  padding: 12px 14px; color: var(--text);
  font-size: 14px; font-family: 'Inter', sans-serif;
  resize: none; outline: none; margin-bottom: 10px;
  -webkit-appearance: none;
}
.diary-ta::placeholder { color: var(--text3); }

/* Month */
.mcat-card { background: var(--bg2); border-radius: var(--r-lg); margin-bottom: 10px; overflow: hidden; }
.mcat-head {
  padding: 12px 14px 10px;
  font-size: 12px; font-weight: 600;
  border-bottom: 0.5px solid var(--border);
}
.mcat-task-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 0.5px solid var(--border);
}
.mcat-task-row:last-child { border-bottom: none; }
.mcat-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border2); flex-shrink: 0;
  cursor: pointer; transition: background 0.15s;
}
.mcat-dot.done { background: var(--green); }
.mcat-inp {
  flex: 1; background: none; border: none;
  color: var(--text); font-size: 13px;
  font-family: 'Inter', sans-serif; outline: none;
}
.mcat-inp::placeholder { color: var(--text3); }
.mcat-inp.done { text-decoration: line-through; color: var(--text3); }

/* Training */
.train-card {
  background: var(--bg2); border-radius: var(--r-lg);
  margin-bottom: 10px; padding: 14px;
  display: flex; align-items: center; gap: 14px;
}
.train-day-badge {
  width: 42px; height: 42px; border-radius: 10px;
  background: var(--bg3);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}
.train-day-badge .tday { font-size: 11px; color: var(--text3); }
.train-day-badge .tnum { font-size: 16px; font-weight: 600; color: var(--text2); }
.train-info { flex: 1; }
.train-name { font-size: 14px; margin-bottom: 2px; }
.train-sub { font-size: 11px; color: var(--text3); }

/* Storage */
.storage-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-bottom: 0.5px solid var(--border);
}
.storage-item:last-child { border-bottom: none; }
.scheck {
  width: 20px; height: 20px; border-radius: 5px;
  border: 1.5px solid var(--border2);
  flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: transparent;
  transition: all 0.2s;
}
.scheck.done { background: rgba(74,222,128,0.1); border-color: var(--green); color: var(--green); }
.sinput {
  flex: 1; background: none; border: none;
  color: var(--text); font-size: 14px;
  font-family: 'Inter', sans-serif; outline: none;
}
.sinput::placeholder { color: var(--text3); }
.sinput.done { text-decoration: line-through; color: var(--text3); }
.sdel { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; }

/* FAB */
.fab {
  position: fixed;
  right: 20px;
  bottom: calc(var(--tab-h) + var(--safe-bot) + 16px);
  width: 52px; height: 52px;
  background: var(--accent);
  border-radius: 50%;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: #000; font-weight: 300;
  box-shadow: 0 4px 20px rgba(126,184,255,0.3);
  z-index: 20;
  transition: transform 0.15s;
}
.fab:active { transform: scale(0.93); }

/* Add input overlay */
.add-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: flex-end;
  backdrop-filter: blur(4px);
}
.add-sheet {
  width: 100%;
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  padding: 20px 16px;
  padding-bottom: calc(16px + var(--safe-bot));
}
.add-sheet h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
.add-sheet input, .add-sheet select {
  width: 100%; background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px; padding: 12px 14px;
  color: var(--text); font-size: 16px;
  font-family: 'Inter', sans-serif; outline: none;
  margin-bottom: 10px;
  -webkit-appearance: none;
}
.add-sheet select option { background: var(--bg3); }
.add-sheet .btn-row { display: flex; gap: 8px; }
.btn-cancel {
  flex: 1; padding: 13px; border-radius: 10px;
  background: var(--bg4); border: none;
  color: var(--text2); font-size: 15px; cursor: pointer;
}
.btn-confirm {
  flex: 2; padding: 13px; border-radius: 10px;
  background: var(--accent); border: none;
  color: #000; font-size: 15px; font-weight: 600; cursor: pointer;
}
.hidden { display: none !important; }

/* Splash */
#splash {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  transition: opacity 0.5s;
}
#splash .slogo {
  font-family: 'Manrope', sans-serif;
  font-size: 32px; font-weight: 800;
  letter-spacing: 6px;
}
#splash .slogo span { color: var(--accent); }
#splash .ssub { font-size: 13px; color: var(--text3); letter-spacing: 2px; }

</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="slogo">ONE<span>·</span>LIFE</div>
  <div class="ssub">ПЛАНЕР</div>
</div>

<!-- App shell -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">ONE<span>·</span>LIFE</div>
    <div class="topbar-week hidden" id="weekNav">
      <button onclick="weekChange(-1)">‹</button>
      <div class="wlbl" id="weekLabel"></div>
      <button onclick="weekChange(1)">›</button>
    </div>
  </div>

  <div class="page-scroll" id="pageScroll"></div>

  <div class="tabbar">
    <div class="tab-btn active" id="tab-week" onclick="showPage('week')">
      <div class="ticon">📅</div>
      <div class="tlbl">Неделя</div>
    </div>
    <div class="tab-btn" id="tab-habits" onclick="showPage('habits')">
      <div class="ticon">🔥</div>
      <div class="tlbl">Привычки</div>
    </div>
    <div class="tab-btn" id="tab-diary" onclick="showPage('diary')">
      <div class="ticon">📓</div>
      <div class="tlbl">Дневник</div>
    </div>
    <div class="tab-btn" id="tab-month" onclick="showPage('month')">
      <div class="ticon">🗓</div>
      <div class="tlbl">Месяц</div>
    </div>
    <div class="tab-btn" id="tab-storage" onclick="showPage('storage')">
      <div class="ticon">💡</div>
      <div class="tlbl">Идеи</div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn" onclick="showAddSheet()">+</button>

<!-- Add sheet -->
<div class="add-overlay hidden" id="addOverlay" onclick="hideAddSheet(event)">
  <div class="add-sheet" id="addSheet">
    <h3 id="addTitle">Новая задача</h3>
    <input id="addInput" type="text" placeholder="Введите текст..." />
    <select id="addDaySelect" class="hidden"></select>
    <div class="btn-row">
      <button class="btn-cancel" onclick="hideAddSheet()">Отмена</button>
      <button class="btn-confirm" onclick="confirmAdd()">Добавить</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───
const DAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const HABITS_DEF = ['Зарядка','Дефицит ккал','Соц сети <1ч','Дневник','Сон 7ч+'];
const MONTH_CATS = [
  {name:'Работа', color:'#7EB8FF'},
  {name:'Деньги', color:'#4ade80'},
  {name:'Спорт',  color:'#fbbf24'},
  {name:'Здоровье', color:'#f87171'},
  {name:'Для себя', color:'#a78bfa'},
  {name:'Быт',    color:'#888'},
];
const TRAINING = [
  {day:'Пн', type:'Подтягивания + бицепс', sub:'Сила'},
  {day:'Вт', type:'Ноги', sub:'Объём'},
  {day:'Ср', type:'Плечи', sub:'Сила'},
  {day:'Чт', type:'Функциональная', sub:'Лёгкая'},
  {day:'Пт', type:'Подтягивания + бицепс', sub:'Объём'},
  {day:'Сб', type:'Отдых', sub:'Бокс, активность'},
  {day:'Вс', type:'Грудь + руки + спина', sub:'Объём'},
];

let page = 'week';
let weekOffset = 0;
let selectedDay = 0;

function ld(k,d){ try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;} }
function sv(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch{} }

function getWeekDates(off){
  const now=new Date(), day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+off*7);
  return DAYS.map((_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function fmt(d){ return d.getDate()+'.'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1); }
function isToday(d){ const n=new Date(); return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth(); }

function wk(off){ return ld('wk_'+off, {goals:['','','',''],goalsD:[false,false,false,false],tasks:DAYS.map(()=>[]),tasksD:DAYS.map(()=>[]),mood:DAYS.map(()=>({sleep:7,energy:7,mood:7,lesson:'',gratitude:''}))}); }
function swk(off,d){ sv('wk_'+off,d); }

function hbData(){ return ld('habits2',{list:[...HABITS_DEF],days:{}}); }
function shbData(d){ sv('habits2',d); }

function mnData(){ return ld('month', MONTH_CATS.map(c=>({...c,tasks:['','','',''],done:[false,false,false,false]}))); }
function smnData(d){ sv('month',d); }

function stData(){ return ld('storage',[]); }
function sstData(d){ sv('storage',d); }

// ─── STATS ───
function calcStats(off){
  const w=wk(off); let tot=0,don=0;
  w.tasks.forEach((ts,di)=>ts.forEach((t,ti)=>{if(t){tot++;if(w.tasksD[di][ti])don++;}}));
  w.goals.forEach((g,i)=>{if(g){tot++;if(w.goalsD[i])don++;}});
  const pct=tot>0?Math.round(don/tot*100):0;
  const gd=w.goals.filter((g,i)=>g&&w.goalsD[i]).length;
  const gt=w.goals.filter(g=>g).length;
  return {tot,don,pct,gd,gt};
}

// ─── PAGES ───
function renderWeek(){
  const w=wk(weekOffset), dates=getWeekDates(weekOffset), s=calcStats(weekOffset);
  const el=document.getElementById('pageScroll');

  // bar chart data
  const bars = DAYS.map((_,di)=>{
    const ts=w.tasks[di]||[], tot=ts.filter(t=>t).length;
    const don=ts.filter((t,ti)=>t&&w.tasksD[di][ti]).length;
    return tot>0?Math.round(don/tot*100):0;
  });

  const dayTasks = (w.tasks[selectedDay]||[]);

  el.innerHTML = `
  <div class="stats-row section">
    <div class="stat-card"><div class="stat-lbl">Задачи</div><div class="stat-val b">${s.tot}</div><div class="pbar"><div class="pbar-fill" style="width:${s.pct}%"></div></div></div>
    <div class="stat-card"><div class="stat-lbl">Выполнено</div><div class="stat-val g">${s.don}</div></div>
    <div class="stat-card"><div class="stat-lbl">Прогресс</div><div class="stat-val a">${s.pct}%</div></div>
    <div class="stat-card"><div class="stat-lbl">Цели</div><div class="stat-val p">${s.gd}/${s.gt}</div></div>
  </div>

  <div class="section card">
    <div class="card-header">Цели недели</div>
    ${w.goals.map((g,i)=>`
      <div class="goal-row">
        <div class="gcheck ${w.goalsD[i]?'done':''}" onclick="toggleGoal(${i})">✓</div>
        <input class="ginput ${w.goalsD[i]&&g?'done':''}" value="${(g||'').replace(/"/g,'&quot;')}" placeholder="Цель ${i+1}..." onchange="setGoal(${i},this.value)" />
      </div>`).join('')}
  </div>

  <div class="section card">
    <div class="card-header">Прогресс по дням</div>
    <div class="week-bars">
      ${DAYS.map((d,di)=>`
        <div class="wbar-col">
          <div class="wbar-inner"><div class="wbar-fill" style="height:${bars[di]}%"></div></div>
          <div class="wbar-lbl">${d}</div>
        </div>`).join('')}
    </div>
  </div>

  <div class="section">
    <div class="day-tabs">
      ${dates.map((d,di)=>`
        <div class="day-tab ${di===selectedDay?'active':''} ${isToday(d)?'today':''}" onclick="selDay(${di})">
          <div class="dtname">${DAYS[di]}</div>
          <div class="dtdate">${fmt(d)}</div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-header">${DAYS[selectedDay]} — задачи</div>
      ${dayTasks.map((t,ti)=>`
        <div class="task-row" onclick="toggleTask(${selectedDay},${ti})">
          <div class="tcheck ${w.tasksD[selectedDay][ti]&&t?'done':''}">✓</div>
          <div class="task-text ${w.tasksD[selectedDay][ti]&&t?'done':''}">${t}</div>
        </div>`).join('')}
      <div class="add-row" onclick="showAddSheet()">
        <div class="add-icon">+</div>
        <span>Добавить задачу</span>
      </div>
    </div>
  </div>`;
}

function renderHabits(){
  const hd=hbData(), dates=getWeekDates(weekOffset);
  const el=document.getElementById('pageScroll');
  el.innerHTML = `
  ${hd.list.map((h,hi)=>{
    const days=dates.map((d)=>(hd.days[fmt(d)]||[])[hi]||false);
    const pct=Math.round(days.filter(Boolean).length/7*100);
    return `<div class="section card">
      <div class="habit-row">
        <div class="habit-top">
          <div class="habit-name">${h}</div>
          <div class="habit-pct">${pct}%</div>
        </div>
        <div class="habit-days">
          ${dates.map((d,di)=>`
            <div class="hday ${days[di]?'done':''}" onclick="toggleHabit(${hi},${di})">
              <div class="hday-name">${DAYS[di]}</div>
              <div class="hday-dot"></div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('')}
  <div class="card section">
    <div class="add-row" onclick="showAddSheet()">
      <div class="add-icon">+</div>
      <span>Новая привычка</span>
    </div>
  </div>`;
}

function renderDiary(){
  const w=wk(weekOffset), dates=getWeekDates(weekOffset);
  const el=document.getElementById('pageScroll');
  el.innerHTML = `
  <div class="mood-row section">
    ${[{k:'sleep',l:'Сон'},{k:'energy',l:'Энергия'},{k:'mood',l:'Настроение'}].map(m=>`
      <div class="mood-card">
        <div class="mood-lbl">${m.l}</div>
        <div class="mood-val">${(w.mood[selectedDay]||{})[m.k]||7}</div>
        <div class="mood-btns">
          <button onclick="adjMood(${selectedDay},'${m.k}',-1)">−</button>
          <button onclick="adjMood(${selectedDay},'${m.k}',1)">+</button>
        </div>
      </div>`).join('')}
  </div>

  <div class="section">
    <div class="day-tabs">
      ${dates.map((d,di)=>`
        <div class="day-tab ${di===selectedDay?'active':''} ${isToday(d)?'today':''}" onclick="selDay(${di})">
          <div class="dtname">${DAYS[di]}</div>
          <div class="dtdate">${fmt(d)}</div>
        </div>`).join('')}
    </div>
  </div>

  <div class="section">
    <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:8px">Урок дня</div>
    <textarea class="diary-ta" rows="3" placeholder="Что я понял сегодня..." onchange="setDiary(${selectedDay},'lesson',this.value)">${(w.mood[selectedDay]||{}).lesson||''}</textarea>
  </div>
  <div class="section">
    <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:8px">Благодарность</div>
    <textarea class="diary-ta" rows="3" placeholder="За что я благодарен..." onchange="setDiary(${selectedDay},'gratitude',this.value)">${(w.mood[selectedDay]||{}).gratitude||''}</textarea>
  </div>`;
}

function renderMonth(){
  const md=mnData(), el=document.getElementById('pageScroll');
  el.innerHTML = md.map((cat,ci)=>`
    <div class="mcat-card section">
      <div class="mcat-head" style="color:${cat.color}">${cat.name}</div>
      ${cat.tasks.map((t,ti)=>`
        <div class="mcat-task-row">
          <div class="mcat-dot ${cat.done[ti]?'done':''}" onclick="toggleMon(${ci},${ti})"></div>
          <input class="mcat-inp ${cat.done[ti]&&t?'done':''}" value="${(t||'').replace(/"/g,'&quot;')}" placeholder="Задача..." onchange="setMon(${ci},${ti},this.value)" />
        </div>`).join('')}
      <div class="add-row" onclick="addMonTask(${ci})">
        <div class="add-icon" style="background:${cat.color}">+</div>
        <span style="color:${cat.color}">Добавить</span>
      </div>
    </div>`).join('');
}

function renderStorage(){
  const items=stData(), el=document.getElementById('pageScroll');
  el.innerHTML = `
  <div class="section card">
    ${items.map((item,i)=>`
      <div class="storage-item">
        <div class="scheck ${item.done?'done':''}" onclick="toggleSt(${i})">✓</div>
        <input class="sinput ${item.done?'done':''}" value="${(item.text||'').replace(/"/g,'&quot;')}" onchange="editSt(${i},this.value)" />
        <button class="sdel" onclick="delSt(${i})">×</button>
      </div>`).join('')}
    ${items.length===0?'<div style="padding:24px;text-align:center;color:var(--text3)">Пока пусто — нажмите + чтобы добавить</div>':''}
  </div>`;
}

// ─── ACTIONS ───
function weekChange(d){ weekOffset+=d; render(); }
function selDay(di){ selectedDay=di; render(); }
function toggleGoal(i){ const w=wk(weekOffset); if(w.goals[i])w.goalsD[i]=!w.goalsD[i]; swk(weekOffset,w); render(); }
function setGoal(i,v){ const w=wk(weekOffset); w.goals[i]=v; swk(weekOffset,w); }
function toggleTask(di,ti){ const w=wk(weekOffset); if(w.tasks[di][ti])w.tasksD[di][ti]=!w.tasksD[di][ti]; swk(weekOffset,w); render(); }
function toggleHabit(hi,di){ const hd=hbData(), dates=getWeekDates(weekOffset), dk=fmt(dates[di]); if(!hd.days[dk])hd.days[dk]=hd.list.map(()=>false); hd.days[dk][hi]=!hd.days[dk][hi]; shbData(hd); render(); }
function adjMood(di,k,d){ const w=wk(weekOffset); if(!w.mood[di])w.mood[di]={sleep:7,energy:7,mood:7,lesson:'',gratitude:''}; w.mood[di][k]=Math.max(1,Math.min(10,(w.mood[di][k]||7)+d)); swk(weekOffset,w); render(); }
function setDiary(di,k,v){ const w=wk(weekOffset); if(!w.mood[di])w.mood[di]={sleep:7,energy:7,mood:7,lesson:'',gratitude:''}; w.mood[di][k]=v; swk(weekOffset,w); }
function toggleMon(ci,ti){ const md=mnData(); md[ci].done[ti]=!md[ci].done[ti]; smnData(md); render(); }
function setMon(ci,ti,v){ const md=mnData(); md[ci].tasks[ti]=v; smnData(md); }
function addMonTask(ci){ const md=mnData(); md[ci].tasks.push(''); md[ci].done.push(false); smnData(md); render(); }
function toggleSt(i){ const d=stData(); d[i].done=!d[i].done; sstData(d); render(); }
function editSt(i,v){ const d=stData(); d[i].text=v; sstData(d); }
function delSt(i){ if(!confirm('Удалить?'))return; const d=stData(); d.splice(i,1); sstData(d); render(); }

// ─── ADD SHEET ───
let addMode = 'task';
function showAddSheet(){
  addMode = page==='storage'?'storage': page==='habits'?'habit':'task';
  const t = addMode==='storage'?'Новая идея': addMode==='habit'?'Новая привычка':'Новая задача';
  document.getElementById('addTitle').textContent=t;
  document.getElementById('addInput').value='';
  document.getElementById('addOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('addInput').focus(),100);
}
function hideAddSheet(e){
  if(!e||e.target===document.getElementById('addOverlay'))
    document.getElementById('addOverlay').classList.add('hidden');
}
function confirmAdd(){
  const v=document.getElementById('addInput').value.trim(); if(!v) return;
  if(addMode==='storage'){
    const d=stData(); d.unshift({text:v,done:false}); sstData(d);
  } else if(addMode==='habit'){
    const hd=hbData(); hd.list.push(v); Object.keys(hd.days).forEach(k=>hd.days[k].push(false)); shbData(hd);
  } else {
    const w=wk(weekOffset); w.tasks[selectedDay].push(v); w.tasksD[selectedDay].push(false); swk(weekOffset,w);
  }
  document.getElementById('addOverlay').classList.add('hidden');
  render();
}
document.getElementById('addInput').addEventListener('keydown',e=>{ if(e.key==='Enter')confirmAdd(); });

// ─── ROUTER ───
function showPage(p){
  page=p;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+p).classList.add('active');
  const wn=document.getElementById('weekNav');
  wn.classList.toggle('hidden', !['week','habits','diary'].includes(p));
  render();
}

function render(){
  const dates=getWeekDates(weekOffset);
  document.getElementById('weekLabel').textContent=fmt(dates[0])+'–'+fmt(dates[6]);
  document.getElementById('pageScroll').scrollTop=0;
  switch(page){
    case 'week': renderWeek(); break;
    case 'habits': renderHabits(); break;
    case 'diary': renderDiary(); break;
    case 'month': renderMonth(); break;
    case 'storage': renderStorage(); break;
  }
}

// ─── INIT ───
// Set selectedDay to today
const _today=new Date().getDay();
selectedDay=_today===0?6:_today-1;

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// Splash
window.addEventListener('load',()=>{
  render();
  setTimeout(()=>{
    const s=document.getElementById('splash');
    s.style.opacity='0';
    setTimeout(()=>s.style.display='none',500);
  },800);
});
</script>
</body>
</html>
